<script>
// ═══ DADOS GLOBAIS ═══
const MEDICOS=[];let CLIENTES=[],GUIAS=[],AGENDA=[],CAIXA=[],PAGAMENTOS_MENS=[];
let GC=1000,LOGIN=null,LOGO_URL=null,ABA_ATUAL='dashboard';
let AGENDA_ID=1,CAIXA_ID=1,MENS_ID=1;
const hoje=new Date(),MES_ATUAL=hoje.getMonth()+1,ANO_ATUAL=hoje.getFullYear();
const fmt=v=>(parseFloat(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtD=d=>d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR"):"—";
const fmtDH=d=>d?new Date(d).toLocaleString("pt-BR"):"—";
const el=id=>document.getElementById(id);
const chip=(label,cor)=>`<span class="chip" style="background:${cor}22;color:${cor}">${label}</span>`;
const meses=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const parseDeps=d=>{if(Array.isArray(d))return d;if(typeof d==='string'&&d&&d!=='null'){try{return JSON.parse(d);}catch(e){return[];}}return[];};
const STATUS_AG=["Agendado","Confirmado","Pago","Guia Emitida","Cancelado","Faltou"];
const COR_STATUS={"Agendado":"#0e7490","Confirmado":"#7c3aed","Pago":"#d97706","Guia Emitida":"#16a34a","Cancelado":"#dc2626","Faltou":"#64748b"};
const TIPOS_CONVENIO=["Mais Fácil Saúde","Particular","Unimed","Bradesco Saúde","Amil","SulAmérica","Hapvida","Outro Convênio"];
const CATEGORIAS_SAIDA=["Despesa Administrativa","Aluguel","Energia/Água/Internet","Material de Escritório","Pagamento Médico (Adiantamento)","Retirada para Depósito Bancário","Transferência Bancária","Outros"];
const CATEGORIAS_ENTRADA=["Consulta / Guia","Mensalidade","Taxa de Adesão","Outros"];

// ═══ SUPABASE ═══
const SUPA_URL='https://mvnriexmmelyvokrsils.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bnJpZXhtbWVseXZva3JzaWxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjI3NTEsImV4cCI6MjA5NTgzODc1MX0.Jq0ord1TT9KSwjCBnOJ7uoQm3N_Uf3beBoHkuL4Is4c';
const SUPA_HEADERS={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function dbGet(tab,fil='',ord=''){
  try{const P=1000;let all=[],off=0;while(true){let u=`${SUPA_URL}/rest/v1/${tab}?select=*`;if(fil)u+=`&${fil}`;if(ord)u+=`&order=${ord}`;u+=`&limit=${P}&offset=${off}`;const r=await fetch(u,{headers:{...SUPA_HEADERS,'Prefer':'count=exact'}});if(!r.ok)break;const d=await r.json();if(!Array.isArray(d)||d.length===0)break;all=all.concat(d);if(d.length<P)break;off+=P;}return all;}catch(e){return[];}
}
async function dbInsert(tab,dados){
  try{const r=await fetch(`${SUPA_URL}/rest/v1/${tab}`,{method:'POST',headers:SUPA_HEADERS,body:JSON.stringify(dados)});if(!r.ok){const t=await r.text();alert('❌ Erro '+r.status+': '+t.substring(0,200));return null;}return await r.json();}catch(e){alert('❌ '+e.message);return null;}
}
async function dbUpdate(tab,campo,val,dados){
  try{const r=await fetch(`${SUPA_URL}/rest/v1/${tab}?${campo}=eq.${encodeURIComponent(val)}`,{method:'PATCH',headers:SUPA_HEADERS,body:JSON.stringify(dados)});if(!r.ok)return null;return await r.json();}catch(e){return null;}
}
async function dbDelete(tab,campo,val){
  try{const r=await fetch(`${SUPA_URL}/rest/v1/${tab}?${campo}=eq.${encodeURIComponent(val)}`,{method:'DELETE',headers:SUPA_HEADERS});return r.ok;}catch(e){return false;}
}
function mostrarLoading(s){const d=el('loading-overlay');if(d)d.style.display=s?'flex':'none';}

async function carregarDados(){
  mostrarLoading(true);
  try{
    const t=await fetch(`${SUPA_URL}/rest/v1/clientes?select=count&limit=1`,{headers:SUPA_HEADERS});
    if(!t.ok){const e=el('supabase-erro');if(e){e.style.display='block';e.innerHTML='<strong>⚠️ Erro ao conectar:</strong> HTTP '+t.status;}mostrarLoading(false);return;}
    const [meds,clis,guis,ags,cxs,mens]=await Promise.all([dbGet('medicos','','nome'),dbGet('clientes','','nome.asc'),dbGet('guias','','numero.desc'),dbGet('agenda','','id.desc'),dbGet('caixa','','id.desc'),dbGet('mensalidades','','id.desc')]);
    MEDICOS.length=0;
    meds.forEach(m=>MEDICOS.push({id:m.id,nome:m.nome,especialidade:m.especialidade||'',endereco:m.endereco||'',banco:m.banco||'',agencia:m.agencia||'',conta:m.conta||'',cpf:m.cpf||'',pix:m.pix||'',senha:m.senha||'1234'}));
    CLIENTES.length=0;
    clis.forEach(c=>CLIENTES.push({codigo:c.codigo,nome:c.nome,cpf:c.cpf||'',rg:c.rg||'',nascimento:c.nascimento||'',endereco:c.endereco||'',telefone:c.telefone||'',email:c.email||'',cep:c.cep||'',estadoCivil:c.estado_civil||'',mensalidade:parseFloat(c.mensalidade)||0,vencimento:parseInt(c.vencimento)||10,status:c.status||'adimplente',plano:c.plano||'ativo',carneAtual:parseInt(c.carne_atual)||1,dependentes:(()=>{const d=c.dependentes;if(Array.isArray(d))return d;if(typeof d==='string'&&d&&d!=='[]'&&d!=='null'){try{return JSON.parse(d);}catch(e){return[];}}return[];})(),dataContrato:c.data_contrato||null}));
    if(guis.length>0){GUIAS.length=0;let mx=GC;guis.forEach(g=>{const n=parseInt((g.numero||'').replace('GUI',''))||0;if(n>mx)mx=n;GUIAS.push({numero:g.numero,codigoCliente:g.codigo_cliente||'',nomePaciente:g.nome_paciente||'',cpfPaciente:g.cpf_paciente||'',tipoAtendimento:g.tipo_atendimento||'titular',medicoId:g.medico_id||'',medicoNome:g.medico_nome||'',especialidade:g.especialidade||'',enderecoAtendimento:g.endereco_atendimento||'',dataHora:g.data_hora||'',tipoServico:g.tipo_servico||'',valorConsulta:parseFloat(g.valor_consulta)||0,valorRepasse:parseFloat(g.valor_repasse)||0,valorPago:parseFloat(g.valor_pago)||0,formaPagamento:g.forma_pagamento||'',infoComplementar:g.info_complementar||'',emitidaEm:g.emitida_em||'',status:g.status||'Emitida',baixadaEm:g.baixada_em||'',mesAtendimento:g.mes_atendimento||0,anoAtendimento:g.ano_atendimento||0,mesRepasse:g.mes_repasse||0,anoRepasse:g.ano_repasse||0});});GC=mx;}
    if(ags.length>0){AGENDA.length=0;let mx=0;ags.forEach(a=>{AGENDA.push({id:a.id,convenio:a.convenio||'',nomePaciente:a.nome_paciente||'',telefone:a.telefone||'',cpf:a.cpf||'',carteirinha:a.carteirinha||'',codigoMFS:a.codigo_mfs||'',medicoId:a.medico_id||'',medicoNome:a.medico_nome||'',medicoExterno:a.medico_externo||'',enderecoMedico:a.endereco_medico||'',tipoServico:a.tipo_servico||'',dataHora:a.data_hora||'',status:a.status||'Agendado',valorConsulta:parseFloat(a.valor_consulta)||0,valorRepasse:parseFloat(a.valor_repasse)||0,observacao:a.observacao||''});if(a.id>mx)mx=a.id;});AGENDA_ID=mx+1;}
    if(cxs.length>0){CAIXA.length=0;let mx=0;cxs.forEach(m=>{CAIXA.push({id:m.id,tipo:m.tipo||'entrada',data:m.data||'',hora:m.hora||'',categoria:m.categoria||'',descricao:m.descricao||'',origem:m.origem||'',formaPgto:m.forma_pgto||'',observacao:m.observacao||'',valor:parseFloat(m.valor)||0});if(m.id>mx)mx=m.id;});CAIXA_ID=mx+1;}
    if(mens.length>0){PAGAMENTOS_MENS.length=0;let mx=0;mens.forEach(p=>{PAGAMENTOS_MENS.push({id:p.id,clienteCpf:p.cliente_cpf||'',clienteNome:p.cliente_nome||'',clienteCod:p.cliente_cod||'',parcela:p.parcela||1,valor:parseFloat(p.valor)||0,formaPgto:p.forma_pgto||'',dataPgto:p.data_pgto||'',numRecibo:p.num_recibo||''});if(p.id>mx)mx=p.id;});MENS_ID=mx+1;}
  }catch(e){console.error('Erro ao carregar:',e);}
  mostrarLoading(false);
}

async function novoNum(){
  try{const r=await fetch(`${SUPA_URL}/rest/v1/guias?select=numero&order=numero.desc&limit=1`,{headers:SUPA_HEADERS});if(r.ok){const d=await r.json();if(Array.isArray(d)&&d.length>0){const u=parseInt((d[0].numero||'').replace('GUI',''))||0;return 'GUI'+String(u+1).padStart(6,'0');}}}catch(e){}
  return 'GUI'+String(Date.now()).slice(-6);
}
</script>
<script>

async function fazerLogin(){

  el("login-error").classList.add("hidden");
  if(user==="clinica"&&pass==="admin123"){LOGIN={tipo:"clinica",nome:"Clínica Mais Fácil Saúde",operador:"Administrador"};iniciarApp();return;}
  const FUNC=[{usuario:"priscilla",senha:"1234",nome:"Priscilla Zani"},{usuario:"alessandra",senha:"1234",nome:"Alessandra Chad"}];
  const func=FUNC.find(f=>f.usuario===user&&f.senha===pass);
  if(func){LOGIN={tipo:"clinica",nome:func.nome,operador:func.nome};iniciarApp();return;}
  let lm=MEDICOS.length>0?MEDICOS:[];
  if(lm.length===0){try{const r=await fetch(`${SUPA_URL}/rest/v1/medicos?select=*`,{headers:SUPA_HEADERS});if(r.ok)lm=await r.json();}catch(e){}}

async function iniciarApp(){
  el("login-screen").classList.add("hidden");el("app-screen").classList.remove("hidden");
  await carregarDados();
  el("user-name").textContent=LOGIN.tipo==="clinica"?(LOGIN.nome||"Clínica"):LOGIN.medico.nome;
  el("user-role").textContent=LOGIN.tipo==="clinica"?(LOGIN.operador==="Administrador"?"Administrador":"Funcionária"):LOGIN.medico.especialidade;
  const bd=el("btn-diagnostico");if(bd)bd.style.display=(LOGIN.tipo==="clinica"&&LOGIN.operador==="Administrador")?"":"none";
  el("user-icon").textContent=LOGIN.tipo==="clinica"?(LOGIN.operador==="Administrador"?"🏥":"👩‍💼"):"👨‍⚕️";
  if(LOGIN.tipo==="medico"){

    el("medico-tab-label").textContent="👨‍⚕️ Portal Exclusivo — "+LOGIN.medico.nome;

function sair(){LOGIN=null;el("app-screen").classList.add("hidden");el("login-screen").classList.remove("hidden");el("login-user").value="";el("login-pass").value="";el("tabs-clinica").classList.remove("hidden");el("tabs-medico").classList.add("hidden");el("btn-logo").classList.remove("hidden");}
function carregarLogo(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{LOGO_URL=ev.target.result;el("btn-logo").textContent="🖼️ Trocar Logo";};r.readAsDataURL(f);}
async function diagnosticarBanco(){
  const tabs=['clientes','medicos','guias','agenda','caixa','mensalidades'];
  let res='🔍 DIAGNÓSTICO\n';
  for(const t of tabs){try{const r=await fetch(`${SUPA_URL}/rest/v1/${t}?select=*&limit=1`,{headers:SUPA_HEADERS});res+=r.ok?`✅ ${t}: OK\n`:`❌ ${t}: HTTP ${r.status}\n`;}catch(e){res+=`💥 ${t}: ${e.message}\n`;}}
  res+=`\nMemória: Clientes=${CLIENTES.length} Médicos=${MEDICOS.length} Guias=${GUIAS.length}`;
  alert(res);
}

  el("aba-"+aba).classList.remove("hidden");if(btn)btn.classList.add("active");ABA_ATUAL=aba;

  const nome=el("f-nome").value.trim(),cpf=el("f-cpf").value.trim();
  if(!nome||!cpf){alert("Nome e CPF obrigatórios.");return;}
  const nomeD=el("dep-nome")?el("dep-nome").value.trim():"";
  if(nomeD){if(!window._DEPS_FORM)window._DEPS_FORM=[];window._DEPS_FORM.push({nome:nomeD,cpf:el("dep-cpf")?el("dep-cpf").value.trim():"",nascimento:el("dep-nasc")?el("dep-nasc").value:""});el("dep-nome").value="";}
  const depsArray=Array.isArray(window._DEPS_FORM)?[...window._DEPS_FORM]:[];
  const dados={codigo:novoCod,nome,cpf,rg:el("f-rg").value||null,nascimento:el("f-nasc").value||null,telefone:el("f-tel").value||null,email:el("f-email").value||null,endereco:el("f-end").value||null,mensalidade:parseFloat(el("f-mens").value)||0,vencimento:parseInt(el("f-venc").value)||10,status:el("f-status").value,plano:el("f-plano").value,carne_atual:parseInt(el("f-carne").value)||1,dependentes:JSON.stringify(depsArray)};
  let ok;
  if(codigoOriginal)ok=await dbUpdate('clientes','codigo',codigoOriginal,dados);
  else ok=await dbInsert('clientes',dados);
  if(ok===null){alert("❌ Erro ao salvar.");return;}
  const cl={...dados,carneAtual:dados.carne_atual,dependentes:depsArray};
  if(codigoOriginal){const idx=CLIENTES.findIndex(c=>c.codigo===codigoOriginal);if(idx>=0)CLIENTES[idx]=cl;else CLIENTES.push(cl);}else CLIENTES.push(cl);
  renderClientes();alert("✅ Beneficiário salvo!");
}
function editarCli(codigo){abrirFormCli(codigo).catch(e=>console.error(e));}

      <div style="background:${bg};border-radius:10px;padding:8px 10px;font-size:18px">${ic}</div>

        <div style="font-size:11px;color:#94a3b8">${g.codigoCliente} • ${g.medicoNome} • ${fmtDH(g.dataHora)}</div>
        ${g.infoComplementar?`<div style="font-size:11px;color:#b45309;font-weight:600;margin-top:2px">⚕️ ${g.infoComplementar.substring(0,60)}${g.infoComplementar.length>60?"...":""}</div>`:""}
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      ${chip(g.status,g.status==="Baixada"?"#16a34a":g.status==="Cancelada"?"#dc2626":"#0e7490")}
      <span style="font-weight:800;color:#0e7490">${fmt(g.valorConsulta)}</span>
      <button style="padding:7px 12px;background:#f0f9ff;border:1.5px solid #0e7490;border-radius:8px;color:#0e7490;font-weight:700;font-size:12px;cursor:pointer" onclick="reimprGuia('${g.numero}')">🖨️ Guia</button>
      ${g.status!=="Baixada"&&g.status!=="Cancelada"?`<button style="padding:7px 12px;background:#fee2e2;border:1.5px solid #dc2626;border-radius:8px;color:#dc2626;font-weight:700;font-size:12px;cursor:pointer" onclick="alterarStatusGuia('${g.numero}')">❌ Cancelar</button>`:`<span style="font-size:11px;font-weight:800;color:${g.status==="Baixada"?"#16a34a":"#dc2626"}">${g.status==="Baixada"?"🔒 Baixada":"🚫 Cancelada"}</span>`}
      <button style="padding:7px 12px;background:#f0fdf4;border:1.5px solid #16a34a;border-radius:8px;color:#16a34a;font-weight:700;font-size:12px;cursor:pointer" onclick="reimprRecibo('${g.numero}')">🧾 Recibo</button>
    </div>
  </div>`;
}

function filtrarGuias(busca){
  const f=GUIAS.filter(g=>g.numero.includes(busca)||(g.nomePaciente||"").toLowerCase().includes(busca.toLowerCase())||g.codigoCliente.includes(busca));
  el("lista-guias").innerHTML=f.length===0?'<p style="text-align:center;padding:20px;color:#cbd5e1">Nenhuma guia encontrada.</p>':f.map(g=>guiaRow(g)).join("");
}

            <button class="btn btn-primary" onclick="buscarCliGuia()">Buscar</button>

            <div id="ng-cli-cod" style="font-size:12px;color:#0e7490;margin-bottom:12px"></div>

            <select class="form-control" id="ng-paciente"></select>
          </div>
        </div>
      </div>
      <div class="card" id="ng-form-card" style="display:none"><div class="card-header"><span>📋</span><div class="card-title">2. Dados do Atendimento</div></div>
        <div class="card-body">
          <div class="form-group"><label class="form-label">Médico *</label>
            <select class="form-control" id="ng-medico" onchange="mostrarEndMedico()">
              <option value="">Selecione...</option>
              ${MEDICOS.map(m=>`<option value="${m.id}">${m.nome} — ${m.especialidade}</option>`).join("")}
            </select>
          </div>
          <div id="ng-end-med" style="display:none;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#0c4a6e"></div>

function buscarCliGuia(){
  const termo=el("ng-busca").value.trim().toUpperCase();
  const c=CLIENTES.find(x=>x.codigo===termo||x.cpf.replace(/\D/g,"")=== el("ng-busca").value.trim().replace(/\D/g,""));
  const msg=el("ng-msg");
  if(!c){msg.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Não encontrado.</span></div>';GUIA_CLI_OK=null;el("ng-cli-info").style.display="none";el("ng-form-card").style.display="none";return;}
  if(c.plano==="cancelado"){msg.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Plano cancelado.</span></div>';GUIA_CLI_OK=null;el("ng-cli-info").style.display="none";el("ng-form-card").style.display="none";return;}

function mostrarEndMedico(){const id=el("ng-medico").value;const med=MEDICOS.find(m=>m.id===id);if(med){el("ng-end-med").textContent="📍 "+med.endereco;el("ng-end-med").style.display="block";}else el("ng-end-med").style.display="none";}

async function emitirGuia(){
  if(!GUIA_CLI_OK){alert("Busque um beneficiário.");return;}
  const medId=el("ng-medico").value;if(!medId){alert("Selecione o médico.");return;}
  const dataHora=el("ng-data").value;if(!dataHora){alert("Informe data e hora.");return;}
  const infoComp=el("ng-info-comp")?el("ng-info-comp").value:"";
  const tipoAt=el("ng-paciente").value;
  const paciente=tipoAt==="titular"?{nome:GUIA_CLI_OK.nome,cpf:GUIA_CLI_OK.cpf}:GUIA_CLI_OK.dependentes.find((_,i)=>"dep_"+i===tipoAt);
  const med=MEDICOS.find(m=>m.id===medId);
  const numero=await novoNum();
  const mesAt=new Date(dataHora).getMonth()+1,anoAt=new Date(dataHora).getFullYear();
  const nova={numero,codigoCliente:GUIA_CLI_OK.codigo,nomePaciente:paciente?paciente.nome:GUIA_CLI_OK.nome,cpfPaciente:paciente?paciente.cpf:GUIA_CLI_OK.cpf,tipoAtendimento:tipoAt,medicoId:medId,medicoNome:med?med.nome:"",especialidade:med?med.especialidade:"",enderecoAtendimento:med?med.endereco:"",dataHora,tipoServico:el("ng-tipo").value,valorConsulta:parseFloat(el("ng-vc").value)||0,valorRepasse:parseFloat(el("ng-vr").value)||0,valorPago:parseFloat(el("ng-vp").value)||0,formaPagamento:el("ng-fp").value,infoComplementar:infoComp,emitidaEm:new Date().toISOString(),status:"Emitida",mesAtendimento:mesAt,anoAtendimento:anoAt,mesRepasse:mesAt===12?1:mesAt+1,anoRepasse:mesAt===12?anoAt+1:anoAt};
  const res=await dbInsert('guias',{codigo_cliente:nova.codigoCliente,nome_paciente:nova.nomePaciente,cpf_paciente:nova.cpfPaciente,tipo_atendimento:nova.tipoAtendimento,medico_id:nova.medicoId,medico_nome:nova.medicoNome,especialidade:nova.especialidade,endereco_atendimento:nova.enderecoAtendimento,data_hora:nova.dataHora,tipo_servico:nova.tipoServico,valor_consulta:nova.valorConsulta,valor_repasse:nova.valorRepasse,valor_pago:nova.valorPago,forma_pagamento:nova.formaPagamento,info_complementar:infoComp||null,emitida_em:nova.emitidaEm,status:nova.status,mes_atendimento:nova.mesAtendimento,ano_atendimento:nova.anoAtendimento,mes_repasse:nova.mesRepasse,ano_repasse:nova.anoRepasse});
  if(!res){alert("❌ Erro ao salvar guia.");return;}
  const numFinal=Array.isArray(res)?res[0]?.numero:res?.numero;
  if(numFinal)nova.numero=numFinal;
  GUIAS.unshift(nova);GUIA_TELA="lista";renderGuias();
  const pac=paciente||{nome:GUIA_CLI_OK.nome,cpf:GUIA_CLI_OK.cpf};
  setTimeout(()=>{imprimirGuiaPDF(nova,med,pac);setTimeout(()=>imprimirReciboPDF(nova,med,pac),800);},300);
}

function alterarStatusGuia(numero){
  const g=GUIAS.find(x=>x.numero===numero);if(!g)return;
  if(g.status==="Baixada"){alert("🚫 Guia baixada pelo médico — não pode ser cancelada.");return;}
  if(g.status==="Cancelada"){alert("❌ Já cancelada.");return;}
  if(!confirm("Cancelar a guia "+numero+"?"))return;
  const agora=new Date().toISOString();
  dbUpdate('guias','numero',numero,{status:'Cancelada',baixada_em:agora});
  const idx=GUIAS.findIndex(x=>x.numero===numero);
  if(idx>=0){GUIAS[idx].status='Cancelada';GUIAS[idx].baixadaEm=agora;}
  renderGuias();
}

            <button onclick="excluirAgenda(${a.id})" style="padding:5px 10px;background:#fee2e2;border:none;border-radius:6px;color:#dc2626;font-size:11px;cursor:pointer">✕</button>

        </td>

      <div style="background:#fff;border-radius:20px;max-width:620px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.35)">

          <div><div style="color:rgba(255,255,255,.7);font-size:11px;letter-spacing:2px">MAIS FÁCIL SAÚDE</div><div style="color:#fff;font-weight:900;font-size:18px" id="ag-modal-titulo">Novo Agendamento</div></div>
          <button onclick="el('modal-agenda').classList.add('hidden')" style="background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:18px;cursor:pointer">✕</button>
        </div>
        <div style="padding:24px 28px">

            <label class="form-label">Tipo de Atendimento *</label>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px" id="ag-convenio-btns">
              ${TIPOS_CONVENIO.map((c,i)=>`<button onclick="selecionarConvenioAg('${c}')" id="ag-conv-btn-${i}" style="padding:10px 6px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;font-weight:700;font-size:11px;cursor:pointer">${c==="Mais Fácil Saúde"?"🏥":c==="Particular"?"💵":"🤝"} ${c}</button>`).join("")}
            </div>

            <div style="font-size:11px;font-weight:900;color:#0e7490;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">👤 Dados do Paciente</div>
            <div id="ag-busca-mfs" style="display:none;margin-bottom:12px">
              <div style="display:flex;gap:8px"><input class="form-control" id="ag-cpf-busca" placeholder="CPF ou código MFS" onkeydown="if(event.key==='Enter')buscarPacienteAg()"><button class="btn btn-primary btn-sm" onclick="buscarPacienteAg()">Buscar</button></div>

              <div class="form-group" style="margin-bottom:10px"><label class="form-label">Valor da Consulta R$</label><input class="form-control" id="ag-valor" type="number" min="0" step="0.01" placeholder="0,00"></div>
              <div class="form-group" style="margin-bottom:10px" id="ag-repasse-group"><label class="form-label">Valor Repasse R$</label><input class="form-control" id="ag-repasse" type="number" min="0" step="0.01" placeholder="0,00"></div>

          <div style="display:flex;gap:12px;margin-top:16px">

            <button class="btn btn-outline" onclick="el('modal-agenda').classList.add('hidden')">Cancelar</button>

}

function selecionarConvenioAg(conv){
  _AG_CONVENIO=conv;el("ag-convenio-sel").value=conv;
  document.querySelectorAll("[id^='ag-conv-btn-']").forEach(b=>{b.style.background="#f8fafc";b.style.color="#64748b";b.style.borderColor="#e2e8f0";});
  TIPOS_CONVENIO.forEach((c,i)=>{if(c===conv){const b=el("ag-conv-btn-"+i);if(b){b.style.background="#0e7490";b.style.color="#fff";b.style.borderColor="#0e7490";}}});
  if(conv==="Mais Fácil Saúde"){el("ag-busca-mfs").style.display="block";el("ag-conv-label").textContent="Código MFS";el("ag-repasse-group").style.display="block";}
  else{el("ag-busca-mfs").style.display="none";el("ag-info-mfs").style.display="none";el("ag-conv-label").textContent=conv==="Particular"?"Observação":"Nº Carteirinha / Plano";el("ag-repasse-group").style.display=conv==="Particular"?"none":"block";}
}
function buscarPacienteAg(){
  const termo=el("ag-cpf-busca").value.trim().replace(/\D/g,"");
  const c=CLIENTES.find(x=>x.cpf.replace(/\D/g,"")=== termo||x.codigo===el("ag-cpf-busca").value.trim().toUpperCase());
  const me=el("ag-busca-msg");
  if(!c){me.innerHTML='<div class="alert alert-red" style="padding:8px 12px;font-size:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Não encontrado.</span></div>';return;}
  if(c.status==="inadimplente")me.innerHTML=`<div class="alert alert-yellow" style="padding:8px 12px;font-size:12px"><span>⚠️</span><span style="color:#92400e;font-weight:700">${c.nome} — INADIMPLENTE.</span></div>`;
  else me.innerHTML=`<div class="alert alert-green" style="padding:8px 12px;font-size:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — Adimplente</span></div>`;
  el("ag-nome").value=c.nome;el("ag-cpf").value=c.cpf;el("ag-tel").value=c.telefone||"";el("ag-carteirinha").value=c.codigo;el("ag-codigo-mfs").value=c.codigo;
  el("ag-info-mfs").style.display="block";el("ag-info-mfs-texto").textContent=c.codigo+" • "+fmt(c.mensalidade)+" • Vence dia "+c.vencimento;
}
function preencherEndAg(){
  const id=el("ag-medico").value;
  if(id==="externo"){el("ag-end-med").style.display="none";el("ag-medico-externo").style.display="block";return;}
  el("ag-medico-externo").style.display="none";
  const med=MEDICOS.find(m=>m.id===id);
  if(med){el("ag-end-med").style.display="block";el("ag-end-med").textContent="📍 "+med.endereco;}else el("ag-end-med").style.display="none";
}
function abrirFormAgenda(idEdit){
  el("modal-agenda").classList.remove("hidden");el("ag-id-edit").value=idEdit||"";el("ag-modal-titulo").textContent=idEdit?"Editar Agendamento":"Novo Agendamento";_AG_CONVENIO="";
  if(idEdit){
    const a=AGENDA.find(x=>x.id===idEdit);if(!a)return;
    selecionarConvenioAg(a.convenio);el("ag-nome").value=a.nomePaciente;el("ag-tel").value=a.telefone||"";el("ag-cpf").value=a.cpf||"";el("ag-carteirinha").value=a.carteirinha||"";el("ag-codigo-mfs").value=a.codigoMFS||"";el("ag-medico").value=a.medicoId||"";el("ag-tipo").value=a.tipoServico;el("ag-datahora").value=a.dataHora;el("ag-status").value=a.status;el("ag-valor").value=a.valorConsulta||"";el("ag-repasse").value=a.valorRepasse||"";el("ag-obs").value=a.observacao||"";el("ag-med-ext").value=a.medicoExterno||"";
    if(a.codigoMFS){el("ag-info-mfs").style.display="block";el("ag-info-mfs-texto").textContent=a.codigoMFS;}
    preencherEndAg();
  }else{
    ["ag-nome","ag-tel","ag-cpf","ag-carteirinha","ag-valor","ag-repasse","ag-obs","ag-cpf-busca","ag-med-ext"].forEach(i=>{const e=el(i);if(e)e.value="";});
    el("ag-medico").value="";el("ag-tipo").value="Consulta";el("ag-status").value="Agendado";el("ag-end-med").style.display="none";el("ag-medico-externo").style.display="none";el("ag-info-mfs").style.display="none";el("ag-busca-mfs").style.display="none";el("ag-busca-msg").innerHTML="";el("ag-codigo-mfs").value="";
    const now=new Date();now.setMinutes(Math.ceil(now.getMinutes()/15)*15);el("ag-datahora").value=now.toISOString().slice(0,16);
  }
}
async function salvarAgenda(){
  const nome=el("ag-nome").value.trim(),dh=el("ag-datahora").value,conv=el("ag-convenio-sel").value||_AG_CONVENIO;
  if(!nome){alert("Informe o nome do paciente.");return;}if(!dh){alert("Informe a data e hora.");return;}if(!conv){alert("Selecione o tipo de convênio.");return;}
  const medId=el("ag-medico").value,med=MEDICOS.find(m=>m.id===medId),medExt=el("ag-med-ext").value.trim();
  const dados={convenio:conv,nome_paciente:nome,telefone:el("ag-tel").value||null,cpf:el("ag-cpf").value||null,carteirinha:el("ag-carteirinha").value||null,codigo_mfs:el("ag-codigo-mfs").value||null,medico_id:medId||null,medico_nome:med?med.nome:medExt||null,medico_externo:medExt||null,endereco_medico:med?med.endereco:null,tipo_servico:el("ag-tipo").value,data_hora:dh,status:el("ag-status").value,valor_consulta:parseFloat(el("ag-valor").value)||0,valor_repasse:parseFloat(el("ag-repasse").value)||0,observacao:el("ag-obs").value||null};
  const idEdit=el("ag-id-edit").value;
  if(idEdit){
    await dbUpdate('agenda','id',idEdit,dados);
    const idx=AGENDA.findIndex(x=>x.id===parseInt(idEdit));
    if(idx>=0)AGENDA[idx]={...AGENDA[idx],convenio:conv,nomePaciente:nome,telefone:dados.telefone||'',cpf:dados.cpf||'',carteirinha:dados.carteirinha||'',codigoMFS:dados.codigo_mfs||'',medicoId:medId||'',medicoNome:dados.medico_nome||'',medicoExterno:medExt,enderecoMedico:dados.endereco_medico||'',tipoServico:dados.tipo_servico,dataHora:dh,status:dados.status,valorConsulta:dados.valor_consulta,valorRepasse:dados.valor_repasse,observacao:dados.observacao||''};
  }else{
    const res=await dbInsert('agenda',dados);const newId=res?res[0]?.id:AGENDA_ID++;
    AGENDA.push({id:newId,convenio:conv,nomePaciente:nome,telefone:dados.telefone||'',cpf:dados.cpf||'',carteirinha:dados.carteirinha||'',codigoMFS:dados.codigo_mfs||'',medicoId:medId||'',medicoNome:dados.medico_nome||'',medicoExterno:medExt,enderecoMedico:dados.endereco_medico||'',tipoServico:dados.tipo_servico,dataHora:dh,status:dados.status,valorConsulta:dados.valor_consulta,valorRepasse:dados.valor_repasse,observacao:dados.observacao||''});
  }
  el("modal-agenda").classList.add("hidden");renderAgenda();
}
async function mudarStatusAg(id,novoStatus){
  await dbUpdate('agenda','id',id,{status:novoStatus});
  const idx=AGENDA.findIndex(x=>x.id===id);if(idx>=0)AGENDA[idx].status=novoStatus;
  if(novoStatus==="Pago")alert("✅ Pagamento confirmado!\n"+((AGENDA.find(x=>x.id===id)||{}).nomePaciente||""));
  renderAgenda();
}
function editarAgenda(id){abrirFormAgenda(id);}
function excluirAgenda(id){if(!confirm("Excluir este agendamento?"))return;AGENDA=AGENDA.filter(x=>x.id!==id);renderAgenda();}

// ═══ EMITIR GUIA DA AGENDA — CORREÇÃO: passa observacao como infoComplementar ═══
async function emitirGuiaAgenda(id){
  const a=AGENDA.find(x=>x.id===id);if(!a){alert("Agendamento não encontrado.");return;}
  const c=a.codigoMFS?CLIENTES.find(x=>x.codigo===a.codigoMFS):null;
  if(c&&c.status==="inadimplente"){alert("⚠️ Cliente INADIMPLENTE. Regularize antes de emitir a guia.");return;}
  const med=MEDICOS.find(m=>m.id===a.medicoId)||null;
  const medNome=med?.nome||a.medicoNome||a.medicoExterno||"Médico Externo";
  const medEndereco=med?.endereco||a.enderecoMedico||"";
  const medEsp=med?.especialidade||"";
  const numero=await novoNum();
  const mesAt=new Date(a.dataHora).getMonth()+1,anoAt=new Date(a.dataHora).getFullYear();
  // *** CORREÇÃO PRINCIPAL: infoComplementar recebe a.observacao da agenda ***
  const nova={numero,codigoCliente:c?c.codigo:"PART",nomePaciente:a.nomePaciente,cpfPaciente:a.cpf||(c?c.cpf:""),tipoAtendimento:"titular",medicoId:a.medicoId||"",medicoNome:medNome,especialidade:medEsp,enderecoAtendimento:medEndereco,dataHora:a.dataHora,tipoServico:a.tipoServico,valorConsulta:a.valorConsulta,valorRepasse:a.valorRepasse,valorPago:a.valorConsulta,formaPagamento:"",infoComplementar:a.observacao||"",emitidaEm:new Date().toISOString(),status:"Emitida",mesAtendimento:mesAt,anoAtendimento:anoAt,mesRepasse:mesAt===12?1:mesAt+1,anoRepasse:mesAt===12?anoAt+1:anoAt};
  const res=await dbInsert('guias',{codigo_cliente:nova.codigoCliente,nome_paciente:nova.nomePaciente,cpf_paciente:nova.cpfPaciente,tipo_atendimento:nova.tipoAtendimento,medico_id:nova.medicoId,medico_nome:nova.medicoNome,especialidade:nova.especialidade,endereco_atendimento:nova.enderecoAtendimento,data_hora:nova.dataHora,tipo_servico:nova.tipoServico,valor_consulta:nova.valorConsulta,valor_repasse:nova.valorRepasse,valor_pago:nova.valorPago,forma_pagamento:"",
  // *** CORREÇÃO: salva observacao no banco como info_complementar ***
  info_complementar:a.observacao||null,emitida_em:nova.emitidaEm,status:nova.status,mes_atendimento:nova.mesAtendimento,ano_atendimento:nova.anoAtendimento,mes_repasse:nova.mesRepasse,ano_repasse:nova.anoRepasse});
  if(!res){alert("❌ Erro ao salvar guia no banco.");return;}
  const numFinal=Array.isArray(res)?res[0]?.numero:res?.numero;
  if(numFinal)nova.numero=numFinal;
  GUIAS.unshift(nova);
  const idx=AGENDA.findIndex(x=>x.id===id);if(idx>=0)AGENDA[idx].status="Guia Emitida";
  await dbUpdate('agenda','id',id,{status:'Guia Emitida'});
  renderAgenda();
  const pac={nome:a.nomePaciente,cpf:a.cpf||(c?c.cpf:"")};
  const medParaImprimir=med||{nome:medNome,especialidade:medEsp,endereco:medEndereco};
  setTimeout(()=>{imprimirGuiaPDF(nova,medParaImprimir,pac);setTimeout(()=>imprimirReciboPDF(nova,medParaImprimir,pac),800);},300);
  alert("✅ Guia "+nova.numero+" emitida com sucesso!");
}

function reimprGuiaAgenda(agId){
  const a=AGENDA.find(x=>x.id===agId);if(!a){alert("Agendamento não encontrado.");return;}
  const guia=GUIAS.find(g=>g.nomePaciente===a.nomePaciente&&g.status==="Emitida")||GUIAS.find(g=>g.nomePaciente===a.nomePaciente);
  if(!guia){alert("Guia não encontrada.");return;}
  const med=MEDICOS.find(m=>m.id===guia.medicoId)||{nome:guia.medicoNome||"",especialidade:guia.especialidade||"",endereco:guia.enderecoAtendimento||""};
  imprimirGuiaPDF(guia,med,{nome:guia.nomePaciente,cpf:guia.cpfPaciente});
}

async function salvarMedico(idx,id){

    ${rm.length===0?'<p style="color:#cbd5e1;text-align:center;padding:40px">Nenhuma guia baixada no período.</p>':rm.map(r=>`
      <div style="border:1.5px solid #e2e8f0;border-radius:16px;margin-bottom:24px;overflow:hidden">
        <div style="background:linear-gradient(135deg,#0c4a6e,#0e7490);padding:16px 22px;display:flex;justify-content:space-between;align-items:center">

    ${rm.length>0?`<div style="background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:14px;padding:18px 24px;display:flex;justify-content:space-between;align-items:center"><div><div style="color:#7dd3fc;font-size:12px;font-weight:700">TOTAL GERAL</div><div style="color:rgba(255,255,255,.65);font-size:12px">Pagamento até 20/${String(mr).padStart(2,"0")}/${ar}</div></div><div style="color:#fff;font-weight:900;font-size:26px;font-family:monospace">${fmt(tG)}</div></div>`:""}`;
  }
  if(REL_ABA==="formas"){
    const pFP=fil.reduce((acc,g)=>{const f=g.formaPagamento||"Não informado";if(!acc[f])acc[f]={total:0,qtd:0};acc[f].total+=g.valorConsulta||0;acc[f].qtd++;return acc;},{});
    return `<div style="font-weight:800;font-size:15px;color:#0c4a6e;margin-bottom:18px">Formas de Pagamento — ${meses[mes-1]}/${ano}</div>
    ${fil.length===0?'<p style="color:#cbd5e1;text-align:center;padding:40px">Nenhuma guia no período.</p>':`
    <div class="grid3" style="margin-bottom:20px">${Object.entries(pFP).sort((a,b)=>b[1].total-a[1].total).map(([f,d])=>`<div style="border:2px solid ${(corFP[f]||"#94a3b8")}40;border-radius:14px;padding:16px 18px;background:${(corFP[f]||"#94a3b8")}08"><div style="font-size:11px;font-weight:900;color:${corFP[f]||"#94a3b8"};text-transform:uppercase;margin-bottom:6px">${f}</div><div style="font-size:24px;font-weight:900;font-family:monospace">${fmt(d.total)}</div><div style="font-size:12px;color:#94a3b8;margin-top:4px">${d.qtd} atendimento(s)</div></div>`).join("")}</div>
    <div style="background:#f8fafc;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between"><div style="font-weight:800;color:#0c4a6e">Total Arrecadado</div><div style="font-weight:900;font-size:18px;color:#0c4a6e;font-family:monospace">${fmt(tC)}</div></div>`}`;
  }
  return "";
}

function mostrarPortalMedico(){
  const med=LOGIN.medico;
  const mes=el("pm-mes")?.value||MES_ATUAL,ano=el("pm-ano")?.value||ANO_ATUAL;
  const gm=GUIAS.filter(g=>g.medicoId===med.id&&g.mesAtendimento===parseInt(mes)&&g.anoAtendimento===parseInt(ano)&&g.status==="Baixada");
  const tR=gm.reduce((s,g)=>s+(g.valorRepasse||0),0);

          </div>
          <div class="repasse-box"><div class="repasse-label">${gm.length} ATENDIMENTOS</div><div class="repasse-val">${fmt(tR)}</div><div class="repasse-data">Repasse até 20/${String(mr).padStart(2,"0")}/${ar}</div></div>
          <div class="alert alert-yellow" style="margin-bottom:12px"><div style="font-size:12px;color:#92400e"><strong>🏦 Meus dados bancários</strong><br>${med.banco} • Ag: ${med.agencia} • CC: ${med.conta}<br>PIX: ${med.pix}</div></div>
          ${gm.length===0?'<p style="color:#cbd5e1;text-align:center;padding:20px;font-size:13px">Nenhuma guia baixada neste período.</p>':
          `<table><thead><tr style="background:#f0f9ff"><th style="padding:8px 12px;color:#0e7490">Guia</th><th style="padding:8px 12px;color:#0e7490">Paciente</th><th style="padding:8px 12px;color:#0e7490">Data</th><th style="padding:8px 12px;color:#0e7490;text-align:right">Repasse</th></tr></thead>

function buscarGuiaMed(){
  const num=el("pm-num").value.trim().toUpperCase(),med=LOGIN.medico,g=GUIAS.find(x=>x.numero===num);
  const msg=el("pm-msg"),res=el("pm-resultado");
  if(!g){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Guia não encontrada.</span></div>';res.innerHTML="";return;}
  if(g.medicoId!==med.id){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Esta guia não pertence ao seu cadastro.</span></div>';res.innerHTML="";return;}
  if(g.status==="Baixada"){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>🚫</span><span style="color:#991b1b;font-weight:700">Guia já baixada em '+fmtDH(g.baixadaEm)+'.</span></div>';res.innerHTML="";return;}
  msg.innerHTML='';
  res.innerHTML=`<div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:16px;margin-bottom:12px"><div style="font-weight:900;font-size:16px;color:#0c4a6e;margin-bottom:4px">${g.nomePaciente}</div><div style="font-size:13px;color:#0e7490">Guia: ${g.numero} • ${fmtDH(g.dataHora)}</div></div>
  <div class="repasse-box"><div class="repasse-label">VALOR DO REPASSE</div><div class="repasse-val">${fmt(g.valorRepasse)}</div><div class="repasse-data">A ser pago em 20/${String(g.mesRepasse).padStart(2,"0")}/${g.anoRepasse}</div></div>
  <button class="btn btn-green" style="width:100%;padding:14px;font-size:15px" onclick="baixarGuiaMed('${g.numero}')">✅ Confirmar Atendimento e Baixar Guia</button>`;
}
async function baixarGuiaMed(numero){
  const g=GUIAS.find(x=>x.numero===numero);if(!g||g.status==="Baixada"){alert("Guia já baixada!");return;}
  const agora=new Date().toISOString();
  await dbUpdate('guias','numero',numero,{status:'Baixada',baixada_em:agora});
  const idx=GUIAS.findIndex(x=>x.numero===numero);
  GUIAS[idx]={...g,status:"Baixada",baixadaEm:agora};
  el("pm-msg").innerHTML='<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">Guia baixada! Repasse de '+fmt(g.valorRepasse)+' será processado no dia 20.</span></div>';
  el("pm-resultado").innerHTML='<div style="background:#fee2e2;color:#dc2626;border-radius:12px;padding:14px;font-weight:800;font-size:14px;text-align:center;border:2px solid #fca5a5">🚫 Guia bloqueada — já utilizada</div>';
  el("pm-num").value="";mostrarPortalMedico();
}

<script>
// ═══ FLUXO DE CAIXA ═══
let _LANC_TIPO="entrada";
function renderCaixa(){
  const hj=new Date().toISOString().split("T")[0],ds=el("caixa-data")?.value||hj,ft=el("caixa-filtro")?.value||"todos";

<script>

function renderMensalidades(){

      <div class="card"><div class="card-header"><span>📋</span><div class="card-title">Últimos Pagamentos</div></div>

function buscarClienteMens(){
  const cpf=el("mens-cpf").value.trim().replace(/\D/g,"");
  const c=CLIENTES.find(x=>x.cpf.replace(/\D/g,"")=== cpf);
  const msgEl=el("mens-msg");
  if(!c){msgEl.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">CPF não encontrado.</span></div>';el("mens-cliente-info").style.display="none";return;}

  window._MENS_CLI=c;window._MENS_PARCELA=null;
  el("mens-cli-nome").textContent=c.nome;el("mens-cli-codigo").textContent=c.codigo+" • Vence dia "+c.vencimento+" • "+fmt(c.mensalidade);
  el("mens-cli-status").innerHTML=chip(c.status,c.status==="adimplente"?"#16a34a":"#dc2626");

  grid.innerHTML=Array.from({length:12},(_,i)=>i+1).map(p=>{
    const pago=p<c.carneAtual,atual=p===c.carneAtual;

  }).join("");
  el("mens-cliente-info").style.display="block";
}
function selecionarParcela(p){
  window._MENS_PARCELA=p;
  const cli=window._MENS_CLI;
  for(let i=1;i<=12;i++){
    const c=el("mens-parcela-"+i);if(!c)continue;
    const pago=i<cli.carneAtual;
    c.style.border=pago?"2px solid #86efac":i===p?"3px solid #0e7490":"2px solid #e2e8f0";
    c.style.background=pago?"#dcfce7":i===p?"#0e7490":(i===cli.carneAtual?"#dbeafe":"#f8fafc");
    c.style.color=pago?"#16a34a":i===p?"#fff":(i===cli.carneAtual?"#1d4ed8":"#475569");
  }
}
async function registrarPagamentoMens(){
  const c=window._MENS_CLI,parcela=window._MENS_PARCELA;
  if(!c){alert("Busque um cliente primeiro.");return;}if(!parcela){alert("Selecione a parcela.");return;}
  const fp=el("mens-fp").value,valor=parseFloat(el("mens-valor").value)||0,dataPgto=el("mens-data").value;

  if(idx>=0&&parcela>=CLIENTES[idx].carneAtual){CLIENTES[idx].carneAtual=novaParc;window._MENS_CLI=CLIENTES[idx];}
  const hora=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const movRes=await dbInsert('caixa',{tipo:'entrada',data:dataPgto,hora,categoria:'Mensalidade',descricao:"Mensalidade parcela "+parcela+"/12 — "+c.nome,origem:c.codigo,forma_pgto:fp,valor});

  el("mens-cpf").value="";el("mens-cliente-info").style.display="none";el("mens-msg").innerHTML="";window._MENS_CLI=null;window._MENS_PARCELA=null;
  renderMensalidades();alert("✅ Pagamento registrado, parcela "+parcela+" baixada e recibo gerado!\nLançado automaticamente no Fluxo de Caixa.");
}
function reimprReciboMens(id){const p=PAGAMENTOS_MENS.find(x=>x.id===id);if(!p)return;const c=CLIENTES.find(x=>x.codigo===p.clienteCod);imprimirReciboMensalidade({...p,endereco:c?c.endereco:""});}

  <div class="pg"><div class="hdr"><strong style="font-size:22px;color:#0c4a6e">MAIS FÁCIL SAÚDE</strong><br><div style="font-weight:900;font-size:14px;margin-top:8px;text-transform:uppercase;letter-spacing:2px">Recibo de Pagamento de Mensalidade</div><div style="font-size:13px;color:#64748b">Comprovante de pagamento — Plano de Saúde</div><div style="display:inline-block;background:#0c4a6e;color:#fff;border-radius:20px;padding:4px 18px;font-size:13px;font-weight:800;font-family:monospace;margin-top:8px">${numRec}</div></div>

    ${p.endereco?`<div class="ln"><span style="color:#64748b;font-weight:600">Endereço:</span><span style="font-weight:700">${p.endereco}</span></div>`:""}
  </div>
  <div class="vbox">
    <div style="color:rgba(255,255,255,.75);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Parcela Paga</div>
    <div style="background:#fff;color:#0c4a6e;font-weight:900;font-size:28px;border-radius:50%;width:56px;height:56px;line-height:56px;margin:0 auto 8px;font-family:monospace">${p.parcela}</div>
    <div style="color:rgba(255,255,255,.75);font-size:12px;margin-bottom:4px">de 12 parcelas</div>

<script>

function buscarClienteIR(){
  const t=el("ir-busca").value.trim().toLowerCase();
  const c=CLIENTES.find(x=>x.nome.toLowerCase().includes(t)||x.cpf.includes(t)||x.codigo.toLowerCase().includes(t));
  if(!c){el("ir-cliente-info").innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Cliente não encontrado.</span></div>';return;}
  window._IR_CLI=c;el("ir-valor").value=(c.mensalidade*12).toFixed(2);
  el("ir-cliente-info").innerHTML=`<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — ${c.codigo}</span></div>`;

function buscarClienteCanc(){
  const t=el("canc-busca").value.trim().toLowerCase();

  el("canc-cliente-info").innerHTML=`<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — ${c.cpf}</span></div>`;
  el("canc-btn").style.display="block";
}
function imprimirDeclaracaoIR(){
  const c=window._IR_CLI;if(!c){alert("Busque um cliente primeiro.");return;}
  const ano=el("ir-ano")?.value||ANO_ATUAL-1,valorTotal=parseFloat(el("ir-valor")?.value)||0;
