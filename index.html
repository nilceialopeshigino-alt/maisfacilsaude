
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Fácil Saúde</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f0f9ff;min-height:100vh}
input,select,button,textarea{font-family:inherit}
.hidden{display:none!important}
/* Login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0c4a6e,#0369a1,#0e7490);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;max-width:420px;width:100%;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.login-header{background:linear-gradient(135deg,#0c4a6e,#0e7490);padding:36px 40px 28px;text-align:center}
.login-header h1{color:#fff;font-size:28px;font-weight:900}
.login-header p{color:#7dd3fc;font-size:20px;font-weight:700;letter-spacing:3px;margin-top:4px}
.login-header small{color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px}
.login-body{padding:36px 40px}
.login-body label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-body input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;margin-bottom:16px;transition:border-color .2s}
.login-body input:focus{border-color:#0e7490}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border:none;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 4px 20px rgba(12,74,110,.35);font-family:Georgia,serif}
.login-hint{margin-top:20px;background:#f8fafc;border-radius:12px;padding:14px 16px;font-size:12px;color:#64748b;line-height:1.9}
.login-hint strong{color:#0c4a6e}
.login-error{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:700;color:#991b1b;text-align:center}
/* Header */
#app-header{background:linear-gradient(135deg,#0c4a6e,#0369a1 60%,#0e7490);box-shadow:0 4px 24px rgba(12,74,110,.3)}
.header-top{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px}
.header-logo{color:#fff;font-weight:900;font-size:20px;font-family:Georgia,serif}
.header-logo span{color:#7dd3fc;font-weight:700;font-size:16px;display:block;letter-spacing:2px}
.header-actions{display:flex;align-items:center;gap:10px}
.user-badge{background:rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px}
.user-badge .name{color:#fff;font-size:12px;font-weight:800}
.user-badge .role{color:#7dd3fc;font-size:10px}
.btn-sair{padding:6px 14px;background:rgba(220,38,38,.25);border:1.5px solid rgba(220,38,38,.4);border-radius:8px;color:#fca5a5;font-size:12px;font-weight:700;cursor:pointer}
.btn-logo{padding:6px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
/* Tabs */
.tabs{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:4px}
.tab{padding:10px 18px;background:transparent;border:none;border-radius:10px 10px 0 0;color:rgba(255,255,255,.65);font-weight:600;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;font-family:Georgia,serif}
.tab.active{background:rgba(255,255,255,.18);color:#fff;font-weight:800;border-bottom-color:#7dd3fc}
/* Content */
#main-content{max-width:1200px;margin:0 auto;padding:28px}
/* Cards */
.card{background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;overflow:hidden;margin-bottom:20px}
.card-header{padding:13px 20px;border-bottom:1.5px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.card-title{font-weight:800;font-size:14px;color:#0f172a}
.card-body{padding:20px}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
/* Stat cards */
.stat-card{background:#fff;border-radius:16px;padding:20px 22px;border:1.5px solid #e2e8f0}
.stat-icon{font-size:24px;margin-bottom:6px}
.stat-val{font-size:32px;font-weight:900;font-family:monospace}
.stat-label{font-size:12px;color:#94a3b8;font-weight:700}
/* Buttons */
.btn{padding:11px 22px;border:2px solid;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border-color:#0e7490}
.btn-outline{background:transparent;color:#0c4a6e;border-color:#0c4a6e}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-red{background:#dc2626;color:#fff;border-color:#dc2626}
/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;color:#1e293b;outline:none;background:#fff}
.form-control:focus{border-color:#0e7490}
.form-control:disabled{background:#f8fafc}
/* Chip */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
/* Table */
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:800;color:#64748b;background:#f8fafc}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px}
/* Alert */
.alert{border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;gap:12px;align-items:center}
.alert-yellow{background:#fef3c7;border:1.5px solid #f59e0b}
.alert-green{background:#f0fdf4;border:1.5px solid #86efac}
.alert-red{background:#fef2f2;border:1.5px solid #fca5a5}
.alert-blue{background:#f0f9ff;border:1.5px solid #bae6fd}
/* Li info */
.li-row{display:flex;gap:8px;padding:4px 0}
.li-k{font-size:11px;color:#94a3b8;font-weight:700;min-width:120px;flex-shrink:0}
.li-v{font-size:13px;color:#1e293b;font-weight:600}
/* Client row */
.client-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Guia row */
.guia-row{background:#fff;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
/* Back btn */
.back-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#0e7490;font-weight:700;margin-bottom:16px;font-family:inherit}
/* Carne grid */
.carne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.carne-cell{padding:8px;border-radius:8px;text-align:center;font-size:12px;font-weight:800;border:1.5px solid #e2e8f0}
/* Portal medico valor */
.repasse-box{background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px}
.repasse-label{color:rgba(255,255,255,.75);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.repasse-val{color:#fff;font-size:42px;font-weight:900;font-family:monospace;margin:8px 0}
.repasse-data{color:#7dd3fc;font-size:14px;font-weight:700}
@media print{.no-print{display:none!important}}
</style>
</head>

const SUPA_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function dbGet(tabela, filtros='', ordem='') {
  try {
    let url = `${SUPA_URL}/rest/v1/${tabela}?select=*`;
    if (filtros) url += `&${filtros}`;
    if (ordem) {
      // Converte formato "coluna.desc" para "coluna=desc" do Supabase REST
      const ord = ordem.replace('.desc','').replace('.asc','');
      const dir = ordem.includes('.desc') ? 'desc' : 'asc';
      url += `&order=${ord}.${dir}`;
    }
    const r = await fetch(url, { headers: SUPA_HEADERS });
    if (!r.ok) { console.error('dbGet error:', r.status, await r.text()); return []; }
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.error('dbGet exception:', e); return []; }
}

async function dbInsert(tabela, dados) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${tabela}`, {
      method: 'POST',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) {
      const errText = await r.text();
      console.error('dbInsert error:', r.status, errText);
      alert('❌ Erro ao salvar em ' + tabela + '\nStatus: ' + r.status + '\n' + errText);
      return null;
    }
    return await r.json();
  } catch(e) {
    console.error('dbInsert exception:', e);
    alert('❌ Erro de conexão: ' + e.message);
    return null;
  }
}

async function dbUpdate(tabela, campo, valor, dados) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, {
      method: 'PATCH',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) { console.error('dbUpdate error:', r.status, await r.text()); return null; }
    return await r.json();
  } catch(e) { console.error('dbUpdate exception:', e); return null; }
}

async function dbDelete(tabela, campo, valor) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, { method: 'DELETE', headers: SUPA_HEADERS });
    return r.ok;
  } catch(e) { console.error('dbDelete exception:', e); return false; }
}

          dataHora:a.data_hora||'', status:a.status||'Agendado',
          valorConsulta:parseFloat(a.valor_consulta)||0,
          valorRepasse:parseFloat(a.valor_repasse)||0,
          observacao:a.observacao||''
        });
        if(a.id > maxId) maxId = a.id;
      });
      AGENDA_ID = maxId + 1;
    }

    if(cxs.length > 0) {
      CAIXA.length = 0;
      let maxId = 0;
      cxs.forEach(m => {
        CAIXA.push({
          id:m.id, tipo:m.tipo||'entrada', data:m.data||'', hora:m.hora||'',
          categoria:m.categoria||'', descricao:m.descricao||'',
          origem:m.origem||'', formaPgto:m.forma_pgto||'',
          observacao:m.observacao||'', valor:parseFloat(m.valor)||0
        });
        if(m.id > maxId) maxId = m.id;
      });
      CAIXA_ID = maxId + 1;
    }

    if(mens.length > 0) {
      PAGAMENTOS_MENS.length = 0;
      let maxId = 0;
      mens.forEach(p => {
        PAGAMENTOS_MENS.push({
          id:p.id, clienteCpf:p.cliente_cpf||'', clienteNome:p.cliente_nome||'',
          clienteCod:p.cliente_cod||'', parcela:p.parcela||1,
          valor:parseFloat(p.valor)||0, formaPgto:p.forma_pgto||'',
          dataPgto:p.data_pgto||'', numRecibo:p.num_recibo||''
        });
        if(p.id > maxId) maxId = p.id;
      });
      MENS_ID = maxId + 1;
    }

  } catch(e) { console.error('Erro ao carregar dados:', e); }
  mostrarLoading(false);
}

  if(d) d.style.display = show ? 'flex' : 'none';

const _salvarCliOriginal = salvarCli;
async function salvarCli(novoCod, codigoOriginal) {
  const nome=el("f-nome").value.trim(), cpf=el("f-cpf").value.trim();
  if(!nome||!cpf){alert("Nome e CPF obrigatórios.");return;}
  const dados={
    codigo:novoCod, nome, cpf, rg:el("f-rg").value||null,
    nascimento:el("f-nasc").value||null, telefone:el("f-tel").value||null,
    email:el("f-email").value||null, endereco:el("f-end").value||null,
    mensalidade:parseFloat(el("f-mens").value)||0,
    vencimento:parseInt(el("f-venc").value)||10,
    status:el("f-status").value, plano:el("f-plano").value,
    carne_atual:parseInt(el("f-carne").value)||1,
    dependentes:window._DEPS_FORM||[]
  };
  let ok;
  if(codigoOriginal) ok = await dbUpdate('clientes','codigo',codigoOriginal,dados);
  else ok = await dbInsert('clientes',dados);
  if(!ok) { alert("❌ Erro ao salvar. Verifique a conexão e tente novamente."); return; }
  await carregarDados();
  renderClientes();
  alert("✅ Beneficiário salvo com sucesso!");
}

function fazerLogin() {
  const user = el("login-user").value.trim().toLowerCase();
  const pass = el("login-pass").value;
  el("login-error").classList.add("hidden");

  if(user === "clinica" && pass === "admin123") {
    LOGIN = {tipo:"clinica", nome:"Clínica Mais Fácil Saúde"};
    iniciarApp();
    return;
  }
  const med = MEDICOS.find(m => m.id.toLowerCase() === user && m.senha === pass);
  if(med) {
    LOGIN = {tipo:"medico", medico:med};
    iniciarApp();
    return;
  }
  el("login-error").textContent = "❌ Usuário ou senha incorretos. Tente novamente.";
  el("login-error").classList.remove("hidden");
}

el("login-pass").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });
el("login-user").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });

async function iniciarApp() {
  el("login-screen").classList.add("hidden");
  el("app-screen").classList.remove("hidden");
  await carregarDados();
  el("user-name").textContent = LOGIN.tipo==="clinica" ? "Clínica" : LOGIN.medico.nome;
  el("user-role").textContent = LOGIN.tipo==="clinica" ? "Administrador" : LOGIN.medico.especialidade;
  el("user-icon").textContent = LOGIN.tipo==="clinica" ? "🏥" : "👨‍⚕️";

  if(LOGIN.tipo === "medico") {
    el("tabs-clinica").classList.add("hidden");
    el("tabs-medico").classList.remove("hidden");
    el("btn-logo").classList.add("hidden");
    el("medico-tab-label").textContent = "👨‍⚕️ Portal Exclusivo — "+LOGIN.medico.nome;
    mostrarPortalMedico();
  } else {
    renderDashboard();
  }
}

        <div style="font-size:11px;color:#94a3b8">${g.codigoCliente} • ${g.medicoNome} • ${fmtDH(g.dataHora)}</div>

function filtrarGuias(busca) {

}

function buscarCliGuia() {
  const termo = el("ng-busca").value.trim().toUpperCase();
  const c = CLIENTES.find(x=>x.codigo===termo||x.cpf===el("ng-busca").value.trim()||x.cpf.replace(/\D/g,"")=== el("ng-busca").value.trim().replace(/\D/g,""));
  const msg = el("ng-msg");
  if(!c){msg.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Não encontrado. Tente MFS00001 ou MFS00003.</span></div>';GUIA_CLI_OK=null;el("ng-cli-info").style.display="none";el("ng-form-card").style.display="none";el("ng-hint").style.display="block";return;}
  if(c.plano==="cancelado"){msg.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Plano cancelado.</span></div>';GUIA_CLI_OK=null;el("ng-cli-info").style.display="none";el("ng-form-card").style.display="none";return;}
  if(c.status==="inadimplente"){msg.innerHTML=`<div class="alert alert-yellow"><span>⚠️</span><span style="color:#92400e;font-weight:700">${c.nome} está INADIMPLENTE. Regularize antes de emitir.</span></div>`;GUIA_CLI_OK=null;el("ng-cli-info").style.display="none";el("ng-form-card").style.display="none";return;}
  GUIA_CLI_OK = c;
  msg.innerHTML='<div class="alert alert-green"><span>✅</span><span style="color:#166534;font-weight:700">'+c.nome+' — adimplente.</span></div>';
  el("ng-hint").style.display="none";
  el("ng-cli-info").style.display="block";
  el("ng-form-card").style.display="block";
  el("ng-cli-nome").textContent = c.nome;
  el("ng-cli-cod").textContent = c.codigo+" • CPF: "+c.cpf;
  el("ng-paciente").innerHTML = `<option value="titular">Titular — ${c.nome}</option>`+c.dependentes.map((d,i)=>`<option value="dep_${i}">Dependente — ${d.nome}</option>`).join("");
}

function mostrarEndMedico() {
  const id=el("ng-medico").value;
  const med=MEDICOS.find(m=>m.id===id);
  if(med){el("ng-end-med").textContent="📍 "+med.endereco;el("ng-end-med").style.display="block";}
  else el("ng-end-med").style.display="none";
}

function emitirGuia() {
  if(!GUIA_CLI_OK){alert("Busque um beneficiário.");return;}
  const medId=el("ng-medico").value;
  if(!medId){alert("Selecione o médico.");return;}
  const dataHora=el("ng-data").value;
  if(!dataHora){alert("Informe data e hora.");return;}

  const tipoAt=el("ng-paciente").value;
  const paciente = tipoAt==="titular" ? {nome:GUIA_CLI_OK.nome,cpf:GUIA_CLI_OK.cpf} : GUIA_CLI_OK.dependentes.find((_,i)=>"dep_"+i===tipoAt);
  const med=MEDICOS.find(m=>m.id===medId);
  const numero=novoNum();
  const mesAt=new Date(dataHora).getMonth()+1;
  const anoAt=new Date(dataHora).getFullYear();

  const nova={
    numero, codigoCliente:GUIA_CLI_OK.codigo,
    nomePaciente:paciente?paciente.nome:GUIA_CLI_OK.nome,
    cpfPaciente:paciente?paciente.cpf:GUIA_CLI_OK.cpf,
    tipoAtendimento:tipoAt, medicoId:medId, medicoNome:med?med.nome:"",
    especialidade:med?med.especialidade:"", enderecoAtendimento:med?med.endereco:"",
    dataHora, tipoServico:el("ng-tipo").value,
    valorConsulta:parseFloat(el("ng-vc").value)||0,
    valorRepasse:parseFloat(el("ng-vr").value)||0,
    valorPago:parseFloat(el("ng-vp").value)||0,
    formaPagamento:el("ng-fp").value,
    emitidaEm:new Date().toISOString(), status:"Emitida",
    mesAtendimento:mesAt, anoAtendimento:anoAt,
    mesRepasse:mesAt===12?1:mesAt+1, anoRepasse:mesAt===12?anoAt+1:anoAt,
  };

  GUIAS.unshift(nova);
  GUIA_TELA="lista";
  renderGuias();
  setTimeout(()=>{
    imprimirGuiaPDF(nova, med, paciente);
    setTimeout(()=>imprimirReciboPDF(nova, med, paciente),800);
  },300);
}

function reimprGuia(numero) {
  const g=GUIAS.find(x=>x.numero===numero);
  const med=MEDICOS.find(m=>m.id===g.medicoId);
  const pac={nome:g.nomePaciente,cpf:g.cpfPaciente};
  imprimirGuiaPDF(g,med,pac);
}
function reimprRecibo(numero) {
  const g=GUIAS.find(x=>x.numero===numero);
  const med=MEDICOS.find(m=>m.id===g.medicoId);
  const pac={nome:g.nomePaciente,cpf:g.cpfPaciente};
  imprimirReciboPDF(g,med,pac);
}

  <div class="page">
    <div class="header">${logoHtml}<div class="titulo">RECIBO DE PAGAMENTO</div><div style="font-size:13px;color:#64748b">Comprovante de pagamento de consulta / atendimento</div><div class="num">${numRec}</div></div>
    <div class="box"><div class="bt">👤 Dados do Pagador</div>
      <div class="ln"><span class="lk">Nome:</span><span class="lv">${pac?pac.nome:""}</span></div>
      <div class="ln"><span class="lk">CPF:</span><span class="lv">${pac?pac.cpf:""}</span></div>
      <div class="ln"><span class="lk">Código:</span><span class="lv" style="font-family:monospace;color:#0e7490">${guia.codigoCliente}</span></div>
      <div class="ln"><span class="lk">Tipo:</span><span class="lv">${guia.tipoAtendimento==="titular"?"Titular":"Dependente"}</span></div>
    </div>
    <div class="box"><div class="bt">🏥 Dados do Atendimento</div>
      <div class="ln"><span class="lk">Médico:</span><span class="lv">${med?med.nome:""}</span></div>
      <div class="ln"><span class="lk">Especialidade:</span><span class="lv">${med?med.especialidade:""}</span></div>
      <div class="ln"><span class="lk">Local:</span><span class="lv">${med?med.endereco:""}</span></div>
      <div class="ln"><span class="lk">Tipo de Serviço:</span><span class="lv">${guia.tipoServico}</span></div>
      <div class="ln"><span class="lk">Data e Hora:</span><span class="lv">${fmtDH(guia.dataHora)}</span></div>
      <div class="ln"><span class="lk">Nº da Guia:</span><span class="lv" style="font-family:monospace;font-weight:900;color:#0c4a6e">${guia.numero}</span></div>
    </div>

    <div style="text-align:center;font-size:14px;color:#1e293b;line-height:1.9;margin:20px 0;padding:16px;background:#f0fdf4;border-radius:10px;border:1.5px solid #86efac"><strong style="color:#16a34a">✅ PAGAMENTO CONFIRMADO</strong><br>Guia de atendimento emitida pelo Mais Fácil Saúde.<br><span style="font-size:12px;color:#64748b">Emitido em ${dataHoje}</span></div>
    <div class="assinaturas">
      <div class="ass"><div class="la"></div><div style="font-weight:700;font-size:13px">${pac?pac.nome:""}</div><div style="font-size:12px;color:#64748b">CPF: ${pac?pac.cpf:""}</div><div style="font-size:11px;color:#94a3b8">PAGADOR</div></div>
      <div class="ass"><div class="la"></div><div style="font-weight:700;font-size:13px">Mais Fácil Saúde</div><div style="font-size:12px;color:#64748b">CNPJ: 00.000.000/0001-00</div><div style="font-size:11px;color:#94a3b8">PRESTADORA</div></div>
    </div>
    <div class="rodape">${numRec} • Guia ${guia.numero} • Mais Fácil Saúde</div>
  </div></body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
}

// ── MÉDICOS ──
function renderMedicos() {
  el("aba-medicos").innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px;gap:10px">
      <button class="btn btn-outline" onclick="mostrarLinkPortalMedico()" style="background:#f0f9ff;border-color:#0e7490;color:#0e7490">🔗 Link Portal Médico</button>
      <button class="btn btn-outline" onclick="abrirImportCSV('medicos')" style="background:#fffbeb;border-color:#f59e0b;color:#b45309">📥 Importar CSV</button>
      <button class="btn btn-primary" onclick="formMedico()">+ Novo Médico</button>
    </div>
    <div class="grid2">
      ${MEDICOS.map((m,i)=>`<div class="card"><div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-weight:900;font-size:15px">${m.nome}</div><span class="chip" style="background:#0e749022;color:#0e7490">${m.especialidade}</span><div style="margin-top:6px;font-size:11px;color:#64748b">🔑 Login: <strong style="font-family:monospace;color:#0c4a6e">${m.id}</strong> • Senha: <strong style="font-family:monospace">${m.senha||'1234'}</strong></div></div>
          <button class="btn btn-outline btn-sm" onclick="formMedico(${i})">Editar</button>
        </div>
        <div style="font-size:12px;color:#64748b;line-height:1.9">
          <div>📍 ${m.endereco}</div><div>🏦 ${m.banco} • Ag: ${m.agencia} • CC: ${m.conta}</div><div>📱 PIX: ${m.pix}</div><div>🪪 CPF: ${m.cpf}</div>
        </div>
      </div></div>`).join("")}
    </div>`;
}

function formMedico(idx) {
  const m = idx!==undefined ? MEDICOS[idx] : {id:"MED"+String(MEDICOS.length+1).padStart(3,"0"),nome:"",especialidade:"",endereco:"",banco:"",agencia:"",conta:"",cpf:"",pix:"",senha:"1234"};
  el("aba-medicos").innerHTML = `
    <button class="back-btn" onclick="renderMedicos()">← Voltar</button>
    <h3 style="margin-bottom:20px;font-weight:900">${idx!==undefined?"Editar Médico":"Novo Médico"}</h3>
    <div class="card" style="max-width:620px"><div class="card-header"><span>👨‍⚕️</span><div class="card-title">Dados Profissionais</div></div>
      <div class="card-body">
        <div class="grid2">
          <div class="form-group"><label class="form-label">Nome</label><input class="form-control" id="m-nome" value="${m.nome}"></div>
          <div class="form-group"><label class="form-label">Especialidade</label><input class="form-control" id="m-esp" value="${m.especialidade}"></div>
          <div class="form-group"><label class="form-label">CPF</label><input class="form-control" id="m-cpf" value="${m.cpf}"></div>
          <div class="form-group"><label class="form-label">Senha Portal</label><input class="form-control" id="m-senha" type="password" value="${m.senha}"></div>
        </div>
        <div class="form-group"><label class="form-label">Endereço de Atendimento</label><input class="form-control" id="m-end" value="${m.endereco}"></div>
        <div class="form-group"><label class="form-label">Chave PIX</label><input class="form-control" id="m-pix" value="${m.pix}"></div>
      </div>
    </div>
    <div class="card" style="max-width:620px"><div class="card-header"><span>🏦</span><div class="card-title">Dados Bancários</div></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div class="form-group"><label class="form-label">Banco</label><input class="form-control" id="m-banco" value="${m.banco}"></div>
          <div class="form-group"><label class="form-label">Agência</label><input class="form-control" id="m-ag" value="${m.agencia}"></div>
          <div class="form-group"><label class="form-label">Conta</label><input class="form-control" id="m-conta" value="${m.conta}"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-primary" onclick="salvarMedico(${idx!==undefined?idx:"undefined"},'${m.id}')">💾 Salvar</button>
      <button class="btn btn-outline" onclick="renderMedicos()">Cancelar</button>
    </div>`;
}

function salvarMedico(idx, id) {
  const novo={id,nome:el("m-nome").value,especialidade:el("m-esp").value,cpf:el("m-cpf").value,senha:el("m-senha").value,endereco:el("m-end").value,pix:el("m-pix").value,banco:el("m-banco").value,agencia:el("m-ag").value,conta:el("m-conta").value};
  if(!novo.nome)return;
  if(idx!=="undefined") MEDICOS[parseInt(idx)]=novo; else MEDICOS.push(novo);
  renderMedicos();
}

// ── RELATÓRIOS ──
let REL_ABA="mensal";
function renderRelatorios() {
  const mes=el("rel-mes")?.value||MES_ATUAL;
  const ano=el("rel-ano")?.value||ANO_ATUAL;
  const medId=el("rel-med")?.value||"";

  el("aba-relatorios").innerHTML = `
    <div class="card"><div class="card-header"><span>🔎</span><div class="card-title">Filtros</div></div>
      <div class="card-body">
        <div class="grid3">
          <div class="form-group"><label class="form-label">Mês</label>
            <select class="form-control" id="rel-mes" onchange="renderRelatorios()">
              ${meses.map((m,i)=>`<option value="${i+1}" ${(i+1)==mes?"selected":""}>${m}</option>`).join("")}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Ano</label>
            <select class="form-control" id="rel-ano" onchange="renderRelatorios()">
              ${[ANO_ATUAL-1,ANO_ATUAL,ANO_ATUAL+1].map(y=>`<option value="${y}" ${y==ano?"selected":""}>${y}</option>`).join("")}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Médico</label>
            <select class="form-control" id="rel-med" onchange="renderRelatorios()">
              <option value="">Todos</option>
              ${MEDICOS.map(m=>`<option value="${m.id}" ${m.id===medId?"selected":""}>${m.nome}</option>`).join("")}
            </select>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;background:#f8fafc;border-radius:10px 10px 0 0;border:1.5px solid #e2e8f0;border-bottom:none;overflow:hidden;margin-bottom:0">
      <button style="padding:9px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-weight:${REL_ABA==="mensal"?800:600};font-size:13px;background:${REL_ABA==="mensal"?"#fff":"transparent"};color:${REL_ABA==="mensal"?"#0c4a6e":"#64748b"};border-bottom:${REL_ABA==="mensal"?"3px solid #0e7490":"3px solid transparent"};font-family:inherit" onclick="REL_ABA='mensal';renderRelatorios()">📊 Mensal</button>
      <button style="padding:9px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-weight:${REL_ABA==="medicos"?800:600};font-size:13px;background:${REL_ABA==="medicos"?"#fff":"transparent"};color:${REL_ABA==="medicos"?"#0c4a6e":"#64748b"};border-bottom:${REL_ABA==="medicos"?"3px solid #0e7490":"3px solid transparent"};font-family:inherit" onclick="REL_ABA='medicos';renderRelatorios()">👨‍⚕️ Repasse Médicos</button>
      <button style="padding:9px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-weight:${REL_ABA==="formas"?800:600};font-size:13px;background:${REL_ABA==="formas"?"#fff":"transparent"};color:${REL_ABA==="formas"?"#0c4a6e":"#64748b"};border-bottom:${REL_ABA==="formas"?"3px solid #0e7490":"3px solid transparent"};font-family:inherit" onclick="REL_ABA='formas';renderRelatorios()">💳 Formas Pgto</button>
    </div>
    <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:0 0 16px 16px;padding:24px;margin-bottom:20px" id="rel-content">
      ${renderRelContent(parseInt(mes),parseInt(ano),medId)}
    </div>`;
}

function renderRelContent(mes,ano,medId) {
  const filtrados=GUIAS.filter(g=>g.mesAtendimento===mes&&g.anoAtendimento===ano&&(medId===""||g.medicoId===medId));
  const totalRep=filtrados.reduce((s,g)=>s+(g.valorRepasse||0),0);
  const totalCons=filtrados.reduce((s,g)=>s+(g.valorConsulta||0),0);
  const baixadas=filtrados.filter(g=>g.status==="Baixada");
  const totalRepBaixadas=baixadas.reduce((s,g)=>s+(g.valorRepasse||0),0);
  const mesRep=mes===12?1:mes+1, anoRep=mes===12?ano+1:ano;
  const medSel=MEDICOS.find(m=>m.id===medId);
  const corFP={"Dinheiro":"#16a34a","PIX":"#0e7490","Cartão de Débito":"#7c3aed","Cartão de Crédito":"#dc2626","Boleto":"#d97706","Isento":"#64748b"};

  if(REL_ABA==="mensal") {
    const tabela = filtrados.length===0?'<p style="color:#cbd5e1;text-align:center;padding:32px">Nenhuma guia no período.</p>':
      `<table><thead><tr><th>Guia</th><th>Paciente</th><th>Médico</th><th>Data</th><th>Forma Pgto</th><th>Consulta</th><th>Repasse</th><th>Status</th></tr></thead><tbody>
      ${filtrados.map(g=>`<tr><td style="font-family:monospace;color:#0e7490;font-weight:700">${g.numero}</td><td style="font-weight:600">${g.nomePaciente}</td><td style="color:#64748b">${g.medicoNome}</td><td style="color:#64748b;font-size:12px">${fmtDH(g.dataHora)}</td><td><span class="chip" style="background:${(corFP[g.formaPagamento]||"#94a3b8")}22;color:${corFP[g.formaPagamento]||"#94a3b8"}">${g.formaPagamento||"—"}</span></td><td style="font-weight:700">${fmt(g.valorConsulta)}</td><td style="color:${g.status==="Baixada"?"#d97706":"#94a3b8"};font-weight:700">${g.status==="Baixada"?fmt(g.valorRepasse):"—"}</td><td>${chip(g.status,g.status==="Baixada"?"#16a34a":"#0e7490")}</td></tr>`).join("")}
      </tbody></table>`;
    return `
      <div class="grid4" style="margin-bottom:24px">
        <div class="stat-card" style="border-left:5px solid #0e7490"><div style="font-size:20px">📋</div><div style="font-size:22px;font-weight:900;color:#0e7490;font-family:monospace">${filtrados.length}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">Guias Emitidas</div></div>
        <div class="stat-card" style="border-left:5px solid #16a34a"><div style="font-size:20px">✅</div><div style="font-size:22px;font-weight:900;color:#16a34a;font-family:monospace">${baixadas.length}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">Guias Baixadas</div></div>
        <div class="stat-card" style="border-left:5px solid #0c4a6e"><div style="font-size:20px">💰</div><div style="font-size:18px;font-weight:900;color:#0c4a6e;font-family:monospace">${fmt(totalCons)}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">Total Arrecadado</div></div>
        <div class="stat-card" style="border-left:5px solid #d97706"><div style="font-size:20px">🏦</div><div style="font-size:16px;font-weight:900;color:#d97706;font-family:monospace">${fmt(totalRepBaixadas)}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">Repasse a Pagar</div></div>
      </div>
      ${medSel?`<div class="alert alert-yellow" style="margin-bottom:20px"><div><strong style="color:#92400e">🏦 Dados Bancários — ${medSel.nome}</strong><br><span style="font-size:12px;color:#92400e">${medSel.banco} • Ag: ${medSel.agencia} • CC: ${medSel.conta} • PIX: ${medSel.pix}</span><br><strong style="color:#92400e">Valor: ${fmt(totalRepBaixadas)} — Vencimento: 20/${String(mesRep).padStart(2,"0")}/${anoRep}</strong></div></div>`:""}
      ${tabela}`;
  }

  if(REL_ABA==="medicos") {
    const relMeds=MEDICOS.map(m=>{
      const gm=GUIAS.filter(g=>g.medicoId===m.id&&g.mesAtendimento===mes&&g.anoAtendimento===ano&&g.status==="Baixada");
      return{med:m,guias:gm,total:gm.reduce((s,g)=>s+(g.valorRepasse||0),0)};
    }).filter(r=>r.guias.length>0);
    const totalGeral=relMeds.reduce((s,r)=>s+r.total,0);
    return `
      <div style="font-weight:800;font-size:15px;color:#0c4a6e;margin-bottom:4px">Repasse por Médico — ${meses[mes-1]}/${ano}</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Apenas guias baixadas geram repasse. Vencimento: dia 20/${String(mesRep).padStart(2,"0")}/${anoRep}</div>
      ${relMeds.length===0?'<p style="color:#cbd5e1;text-align:center;padding:40px">Nenhuma guia baixada no período.</p>':relMeds.map(r=>`
        <div style="border:1.5px solid #e2e8f0;border-radius:16px;margin-bottom:24px;overflow:hidden">
          <div style="background:linear-gradient(135deg,#0c4a6e,#0e7490);padding:16px 22px;display:flex;justify-content:space-between;align-items:center">
            <div><div style="color:#fff;font-weight:900;font-size:16px">${r.med.nome}</div><div style="color:#7dd3fc;font-size:12px">${r.med.especialidade}</div></div>
            <div style="text-align:right"><div style="color:#7dd3fc;font-size:11px;font-weight:700">REPASSE ATÉ 20/${String(mesRep).padStart(2,"0")}/${anoRep}</div><div style="color:#fff;font-weight:900;font-size:22px">${fmt(r.total)}</div></div>
          </div>
          <div style="background:#fef9ec;border-bottom:1.5px solid #fde68a;padding:10px 22px;display:flex;gap:24px;flex-wrap:wrap">
            <span style="font-size:11px;color:#92400e">🏦 <strong>${r.med.banco}</strong> Ag: ${r.med.agencia} CC: ${r.med.conta}</span>
            <span style="font-size:11px;color:#92400e">📱 PIX: <strong>${r.med.pix}</strong></span>
          </div>
          <table>
            <thead><tr style="background:#f0f9ff"><th style="padding:10px 22px;color:#0e7490">Nº da Guia</th><th style="padding:10px 22px;color:#0e7490">Paciente</th><th style="padding:10px 22px;color:#0e7490">Data</th><th style="padding:10px 22px;color:#0e7490;text-align:right">Repasse</th></tr></thead>
            <tbody>${r.guias.map((g,i)=>`<tr style="background:${i%2===0?"#fff":"#fafcff"};border-bottom:1px solid #f1f5f9"><td style="padding:12px 22px;font-family:monospace;font-weight:800;color:#0c4a6e">${g.numero}</td><td style="padding:12px 22px;font-weight:700">${g.nomePaciente}</td><td style="padding:12px 22px;color:#475569">${fmtDH(g.dataHora)}</td><td style="padding:12px 22px;font-weight:900;font-size:15px;color:#d97706;text-align:right">${fmt(g.valorRepasse)}</td></tr>`).join("")}</tbody>
            <tfoot><tr style="background:#f0f9ff;border-top:2px solid #bae6fd"><td colspan="3" style="padding:12px 22px;font-weight:800;color:#0c4a6e">Total — ${r.guias.length} atendimento(s)</td><td style="padding:12px 22px;font-weight:900;font-size:17px;color:#d97706;text-align:right">${fmt(r.total)}</td></tr></tfoot>
          </table>
        </div>`).join("")}
      ${relMeds.length>0?`<div style="background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:14px;padding:18px 24px;display:flex;justify-content:space-between;align-items:center"><div><div style="color:#7dd3fc;font-size:12px;font-weight:700">TOTAL GERAL</div><div style="color:rgba(255,255,255,.65);font-size:12px">Pagamento até 20/${String(mesRep).padStart(2,"0")}/${anoRep}</div></div><div style="color:#fff;font-weight:900;font-size:26px;font-family:monospace">${fmt(totalGeral)}</div></div>`:""}`;
  }

  if(REL_ABA==="formas") {
    const porFP=filtrados.reduce((acc,g)=>{const f=g.formaPagamento||"Não informado";if(!acc[f])acc[f]={total:0,qtd:0};acc[f].total+=g.valorConsulta||0;acc[f].qtd++;return acc;},{});
    return `
      <div style="font-weight:800;font-size:15px;color:#0c4a6e;margin-bottom:18px">Formas de Pagamento — ${meses[mes-1]}/${ano}</div>
      ${filtrados.length===0?'<p style="color:#cbd5e1;text-align:center;padding:40px">Nenhuma guia no período.</p>':
      `<div class="grid3" style="margin-bottom:20px">
        ${Object.entries(porFP).sort((a,b)=>b[1].total-a[1].total).map(([f,d])=>`
          <div style="border:2px solid ${(corFP[f]||"#94a3b8")}40;border-radius:14px;padding:16px 18px;background:${(corFP[f]||"#94a3b8")}08">
            <div style="font-size:11px;font-weight:900;color:${corFP[f]||"#94a3b8"};text-transform:uppercase;margin-bottom:6px">${f}</div>
            <div style="font-size:24px;font-weight:900;font-family:monospace">${fmt(d.total)}</div>
            <div style="font-size:12px;color:#94a3b8;margin-top:4px">${d.qtd} atendimento(s)</div>
          </div>`).join("")}
      </div>

  }

function buscarGuiaMed() {
  const num=el("pm-num").value.trim().toUpperCase();
  const med=LOGIN.medico;
  const g=GUIAS.find(x=>x.numero===num);
  const msg=el("pm-msg");
  const res=el("pm-resultado");

  if(!g){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Guia não encontrada. Verifique o número.</span></div>';res.innerHTML="";return;}
  if(g.medicoId!==med.id){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Esta guia não pertence ao seu cadastro.</span></div>';res.innerHTML="";return;}
  if(g.status==="Baixada"){msg.innerHTML='<div class="alert alert-red" style="margin-bottom:12px"><span>🚫</span><span style="color:#991b1b;font-weight:700">Guia já baixada em '+fmtDH(g.baixadaEm)+'. Não pode ser reutilizada.</span></div>';res.innerHTML="";return;}

  msg.innerHTML='';
  res.innerHTML=`
    <div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:16px;margin-bottom:12px">
      <div style="font-weight:900;font-size:16px;color:#0c4a6e;margin-bottom:4px">${g.nomePaciente}</div>
      <div style="font-size:13px;color:#0e7490;margin-bottom:12px">Guia: ${g.numero} • ${fmtDH(g.dataHora)}</div>
    </div>
    <div class="repasse-box">
      <div class="repasse-label">VALOR DO REPASSE</div>
      <div class="repasse-val">${fmt(g.valorRepasse)}</div>
      <div class="repasse-data">A ser pago em 20/${String(g.mesRepasse).padStart(2,"0")}/${g.anoRepasse}</div>
    </div>
    <button class="btn btn-green" style="width:100%;padding:14px;font-size:15px" onclick="baixarGuiaMed('${g.numero}')">✅ Confirmar Atendimento e Baixar Guia</button>`;
}

function baixarGuiaMed(numero) {
  const g=GUIAS.find(x=>x.numero===numero);
  if(!g||g.status==="Baixada"){alert("Guia já baixada!");return;}
  const agora=new Date().toISOString();
  const idx=GUIAS.findIndex(x=>x.numero===numero);
  GUIAS[idx]={...g,status:"Baixada",baixadaEm:agora};
  el("pm-msg").innerHTML='<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">Guia baixada! Repasse de '+fmt(g.valorRepasse)+' será processado no dia 20.</span></div>';
  el("pm-resultado").innerHTML='<div style="background:#fee2e2;color:#dc2626;border-radius:12px;padding:14px;font-weight:800;font-size:14px;text-align:center;border:2px solid #fca5a5">🚫 Guia bloqueada — já utilizada</div>';
  el("pm-num").value="";
  mostrarPortalMedico();
}

let _LANC_TIPO = "entrada";

function mudarTipoLanc(tipo) {
  _LANC_TIPO = tipo;
  const btnE = el("btn-tipo-entrada");
  const btnS = el("btn-tipo-saida");
  const catSel = el("lanc-cat");
  const fpGrp = el("lanc-fp-group");

  if(tipo==="entrada") {
    btnE.style.cssText="padding:12px;border-radius:10px;border:2px solid #16a34a;background:#dcfce7;color:#166534;font-weight:800;font-size:14px;cursor:pointer";
    btnS.style.cssText="padding:12px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#94a3b8;font-weight:800;font-size:14px;cursor:pointer";
    catSel.innerHTML='<option value="">Selecione...</option>'+CATEGORIAS_ENTRADA.map(c=>`<option value="${c}">${c}</option>`).join("");
    fpGrp.style.display="block";
    el("btn-salvar-lanc").style.background="linear-gradient(135deg,#16a34a,#15803d)";
    el("btn-salvar-lanc").style.borderColor="#16a34a";
  } else {
    btnS.style.cssText="padding:12px;border-radius:10px;border:2px solid #dc2626;background:#fee2e2;color:#991b1b;font-weight:800;font-size:14px;cursor:pointer";
    btnE.style.cssText="padding:12px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#94a3b8;font-weight:800;font-size:14px;cursor:pointer";
    catSel.innerHTML='<option value="">Selecione...</option>'+CATEGORIAS_SAIDA.map(c=>`<option value="${c}">${c}</option>`).join("");
    fpGrp.style.display="block";
    el("btn-salvar-lanc").style.background="#dc2626";

}

function abrirLancamento(tipoInicial="entrada") {
  el("modal-lancamento").classList.remove("hidden");
  _LANC_TIPO = tipoInicial;
  el("modal-titulo").textContent = tipoInicial==="entrada" ? "⬆️ Nova Entrada no Caixa" : "⬇️ Nova Saída do Caixa";
  el("modal-subtitulo").textContent = tipoInicial==="entrada" ? "Receitas, mensalidades, consultas..." : "Despesas, pagamentos, retiradas...";
  mudarTipoLanc(tipoInicial);
  setTimeout(()=>el("lanc-desc").focus(),100);
}

function salvarLancamento() {
  const desc=el("lanc-desc").value.trim();
  const cat=el("lanc-cat").value;
  const valor=parseFloat(el("lanc-valor").value)||0;
  const data=el("lanc-data").value;
  if(!desc||!cat||!valor||!data){alert("Preencha: data, categoria, descrição e valor.");return;}
  const agora=new Date();
  const hora=agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  CAIXA.push({
    id:CAIXA_ID++, tipo:_LANC_TIPO, data, hora,
    categoria:cat, descricao:desc,
    origem:el("lanc-orig").value,
    formaPgto:el("lanc-fp").value||(_LANC_TIPO==="saida"?"Dinheiro":""),
    observacao:el("lanc-obs").value,
    valor, criadoEm:agora.toISOString()
  });
  el("modal-lancamento").classList.add("hidden");
  ["lanc-desc","lanc-orig","lanc-fp","lanc-valor","lanc-obs","lanc-cat"].forEach(id=>{ const e=el(id); if(e) e.value=""; });
  renderCaixa();
}

function excluirLancamento(id) {
  if(!confirm("Excluir este lançamento?"))return;
  CAIXA=CAIXA.filter(m=>m.id!==id);
  renderCaixa();
}

function imprimirCaixa(dataSel) {
  const movsDia=CAIXA.filter(m=>m.data===dataSel);

  const saldoAb=movAnt.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.valor,0)-movAnt.filter(m=>m.tipo==="saida").reduce((s,m)=>s+m.valor,0);

  </style></head><body>

    <div class="sbox"><div style="font-size:10px;font-weight:800;color:${saldoDia>=0?"#0e7490":"#f59e0b"}">RESULTADO DIA</div><div style="font-size:18px;font-weight:900;font-family:monospace;color:${saldoDia>=0?"#0e7490":"#f59e0b"}">${fmt(saldoDia)}</div></div>

  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);

function buscarClienteMens() {
  const cpf = el("mens-cpf").value.trim().replace(/\D/g,"");
  const c = CLIENTES.find(x=>x.cpf.replace(/\D/g,"")===cpf);
  const msgEl = el("mens-msg");

  if(!c) { msgEl.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">CPF não encontrado na base de clientes.</span></div>'; el("mens-cliente-info").style.display="none"; return; }
  if(c.plano==="cancelado") { msgEl.innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Plano cancelado.</span></div>'; el("mens-cliente-info").style.display="none"; return; }

  msgEl.innerHTML='<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">Cliente encontrado!</span></div>';
  window._MENS_CLI = c;
  window._MENS_PARCELA = null;

  el("mens-cli-nome").textContent = c.nome;
  el("mens-cli-codigo").textContent = c.codigo + " • Vence dia " + c.vencimento + " • Mensalidade: " + fmt(c.mensalidade);
  el("mens-cli-status").innerHTML = `<span class="chip" style="background:${c.status==="adimplente"?"#dcfce7":"#fee2e2"};color:${c.status==="adimplente"?"#16a34a":"#dc2626"}">${c.status}</span>`;
  el("mens-valor").value = c.mensalidade.toFixed(2);

  // Renderiza carnê para seleção
  const grid = el("mens-carne-grid");
  grid.innerHTML = Array.from({length:12},(_,i)=>i+1).map(p=>{
    const pago = p < c.carneAtual;
    const atual = p === c.carneAtual;
    return `<div onclick="${pago?"alert('Esta parcela já foi paga.')":"selecionarParcela("+p+")"}"
      id="mens-parcela-${p}"
      style="padding:10px;border-radius:10px;text-align:center;font-weight:800;font-size:13px;cursor:${pago?"not-allowed":"pointer"};
      background:${pago?"#dcfce7":atual?"#dbeafe":"#f8fafc"};
      color:${pago?"#16a34a":atual?"#1d4ed8":"#475569"};
      border:2px solid ${pago?"#86efac":atual?"#93c5fd":"#e2e8f0"};
      opacity:${pago?0.6:1}">
      ${pago?"✓":p}${atual?" ◉":""}
    </div>`;
  }).join("");

  el("mens-cliente-info").style.display="block";
}

function selecionarParcela(p) {
  window._MENS_PARCELA = p;
  // Reset visual
  for(let i=1;i<=12;i++) {
    const cell = el("mens-parcela-"+i);
    if(!cell) continue;
    const cli = window._MENS_CLI;
    const pago = i < cli.carneAtual;
    cell.style.border = pago?"2px solid #86efac":i===p?"3px solid #0e7490":"2px solid #e2e8f0";
    cell.style.background = pago?"#dcfce7":i===p?"#0e7490":(i===cli.carneAtual?"#dbeafe":"#f8fafc");
    cell.style.color = pago?"#16a34a":i===p?"#fff":(i===cli.carneAtual?"#1d4ed8":"#475569");
  }
}

function registrarPagamentoMens() {
  const c = window._MENS_CLI;
  const parcela = window._MENS_PARCELA;
  if(!c) { alert("Busque um cliente primeiro."); return; }
  if(!parcela) { alert("Selecione a parcela a ser paga."); return; }
  const fp = el("mens-fp").value;
  const valor = parseFloat(el("mens-valor").value)||0;
  const dataPgto = el("mens-data").value;
  if(!fp) { alert("Selecione a forma de pagamento."); return; }
  if(!valor) { alert("Informe o valor."); return; }

  const id = MENS_ID++;
  const numRecibo = "REC-MENS-"+String(id).padStart(5,"0");

  // Salvar pagamento
  PAGAMENTOS_MENS.push({id, clienteCpf:c.cpf, clienteNome:c.nome, clienteCod:c.codigo, parcela, valor, formaPgto:fp, dataPgto, numRecibo, emitidoEm:new Date().toISOString()});

  // Baixar parcela do cliente (avançar carnê)
  const idx = CLIENTES.findIndex(x=>x.codigo===c.codigo);
  if(idx>=0 && parcela >= CLIENTES[idx].carneAtual) {
    CLIENTES[idx].carneAtual = parcela + 1;
    window._MENS_CLI = CLIENTES[idx];
  }

  // Lançar no caixa automaticamente
  CAIXA.push({id:CAIXA_ID++, data:dataPgto, hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}), descricao:"Mensalidade parcela "+parcela+"/12 — "+c.nome, origem:c.codigo, formaPgto:fp, valor, criadoEm:new Date().toISOString()});

  // Imprimir recibo
  imprimirReciboMensalidade({id, clienteNome:c.nome, clienteCpf:c.cpf, clienteCod:c.codigo, parcela, valor, formaPgto:fp, dataPgto, numRecibo, endereco:c.endereco});

  // Resetar form
  el("mens-cpf").value=""; el("mens-cliente-info").style.display="none"; el("mens-msg").innerHTML=""; window._MENS_CLI=null; window._MENS_PARCELA=null;
  renderMensalidades();
  alert("✅ Pagamento registrado, parcela "+parcela+" baixada e recibo gerado!\nTambém lançado automaticamente no Fluxo de Caixa.");
}

function reimprReciboMens(id) {
  const p = PAGAMENTOS_MENS.find(x=>x.id===id);
  if(!p) return;
  const c = CLIENTES.find(x=>x.codigo===p.clienteCod);
  imprimirReciboMensalidade({...p, endereco:c?c.endereco:""});
}

function renderAgenda() {
  const hoje2 = new Date().toISOString().split("T")[0];
  const dataSel = el("ag-data")?.value || hoje2;
  const filtroStatus = el("ag-filtro")?.value || "todos";
  const filtroDia = el("ag-dia")?.value || "dia";

  let agsFiltradas = [...AGENDA];

  // Filtro por período
  if(filtroDia === "dia") agsFiltradas = agsFiltradas.filter(a=>a.dataHora.startsWith(dataSel));
  else if(filtroDia === "semana") {
    const d = new Date(dataSel+"T00:00:00");
    const ini = new Date(d); ini.setDate(d.getDate() - d.getDay());
    const fim = new Date(ini); fim.setDate(ini.getDate()+6);
    agsFiltradas = agsFiltradas.filter(a=>{ const dd=new Date(a.dataHora); return dd>=ini&&dd<=fim; });
  } else if(filtroDia === "mes") {
    agsFiltradas = agsFiltradas.filter(a=>a.dataHora.startsWith(dataSel.substring(0,7)));
  }

  if(filtroStatus !== "todos") agsFiltradas = agsFiltradas.filter(a=>a.status===filtroStatus);
  agsFiltradas.sort((a,b)=>a.dataHora.localeCompare(b.dataHora));

  // Totalizadores
  const total = agsFiltradas.length;
  const agendados = agsFiltradas.filter(a=>a.status==="Agendado").length;
  const pagos = agsFiltradas.filter(a=>["Pago","Guia Emitida"].includes(a.status)).length;
  const cancelados = agsFiltradas.filter(a=>["Cancelado","Faltou"].includes(a.status)).length;

  el("aba-agenda").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 style="font-weight:900;font-size:20px;color:#0f172a;margin:0">📅 Agenda de Consultas e Exames</h2>

      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select id="ag-dia" class="form-control" style="width:auto" onchange="renderAgenda()">
          <option value="dia" ${filtroDia==="dia"?"selected":""}>📆 Por dia</option>
          <option value="semana" ${filtroDia==="semana"?"selected":""}>📅 Por semana</option>
          <option value="mes" ${filtroDia==="mes"?"selected":""}>🗓️ Por mês</option>
          <option value="todos" ${filtroDia==="todos"?"selected":""}>📋 Todos</option>
        </select>
        ${filtroDia!=="todos"?`<input type="date" id="ag-data" class="form-control" style="width:auto" value="${dataSel}" onchange="renderAgenda()">`:
        `<input type="date" id="ag-data" class="form-control" style="width:auto;display:none" value="${dataSel}">`}
        <select id="ag-filtro" class="form-control" style="width:auto" onchange="renderAgenda()">
          <option value="todos">Todos</option>
          ${STATUS_AG.map(s=>`<option value="${s}" ${filtroStatus===s?"selected":""}>${s}</option>`).join("")}
        </select>
        <button class="btn btn-primary" onclick="abrirFormAgenda()">+ Novo Agendamento</button>
      </div>
    </div>

    <!-- Totalizadores -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">
      <div class="stat-card" style="border-left:5px solid #0e7490"><div style="font-size:18px">📋</div><div style="font-size:24px;font-weight:900;color:#0e7490;font-family:monospace">${total}</div><div style="font-size:11px;color:#94a3b8;font-weight:700">Total no Período</div></div>

            </tbody>

      </div>
    </div>

let _AG_CONVENIO = "";

function selecionarConvenioAg(conv) {
  _AG_CONVENIO = conv;
  el("ag-convenio-sel").value = conv;

  // Visual dos botões
  document.querySelectorAll("[id^='ag-conv-btn-']").forEach(b=>{
    b.style.background="#f8fafc"; b.style.color="#64748b"; b.style.borderColor="#e2e8f0";
  });
  TIPOS_CONVENIO.forEach((c,i)=>{
    if(c===conv){
      const b=el("ag-conv-btn-"+i);
      if(b){b.style.background="#0e7490";b.style.color="#fff";b.style.borderColor="#0e7490";}
    }
  });

  // Mostrar busca MFS só para Mais Fácil Saúde
  if(conv==="Mais Fácil Saúde") {
    el("ag-busca-mfs").style.display="block";
    el("ag-conv-label").textContent="Código MFS";
    el("ag-repasse-group").style.display="block";
  } else {
    el("ag-busca-mfs").style.display="none";
    el("ag-info-mfs").style.display="none";
    el("ag-conv-label").textContent=conv==="Particular"?"Observação":"Nº Carteirinha / Plano";
    if(conv==="Particular") el("ag-repasse-group").style.display="none";
    else el("ag-repasse-group").style.display="block";
  }
}

function buscarPacienteAg() {
  const termo=el("ag-cpf-busca").value.trim().replace(/\D/g,"");
  const c=CLIENTES.find(x=>x.cpf.replace(/\D/g,"")===termo||x.codigo===el("ag-cpf-busca").value.trim().toUpperCase());
  const msgEl=el("ag-busca-msg");
  if(!c){msgEl.innerHTML='<div class="alert alert-red" style="padding:8px 12px;font-size:12px"><span>❌</span><span style="color:#991b1b;font-weight:700">Não encontrado.</span></div>';return;}
  if(c.status==="inadimplente"){msgEl.innerHTML=`<div class="alert alert-yellow" style="padding:8px 12px;font-size:12px"><span>⚠️</span><span style="color:#92400e;font-weight:700">${c.nome} — INADIMPLENTE. Pagamento necessário antes da guia.</span></div>`;}
  else{msgEl.innerHTML=`<div class="alert alert-green" style="padding:8px 12px;font-size:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — Adimplente</span></div>`;}

  el("ag-nome").value=c.nome;
  el("ag-cpf").value=c.cpf;
  el("ag-tel").value=c.telefone||"";
  el("ag-carteirinha").value=c.codigo;
  el("ag-codigo-mfs").value=c.codigo;
  el("ag-info-mfs").style.display="block";
  el("ag-info-mfs-texto").textContent=c.codigo+" • Mensalidade: "+fmt(c.mensalidade)+" • Vence dia "+c.vencimento;
}

function preencherEndAg() {
  const id=el("ag-medico").value;
  if(id==="externo"){el("ag-end-med").style.display="none";el("ag-medico-externo").style.display="block";return;}
  el("ag-medico-externo").style.display="none";
  const med=MEDICOS.find(m=>m.id===id);
  if(med){el("ag-end-med").style.display="block";el("ag-end-med").textContent="📍 "+med.endereco;}
  else el("ag-end-med").style.display="none";
}

const _registrarPgtoOriginal = registrarPagamentoMens;
async function registrarPagamentoMens() {
  const c = window._MENS_CLI;
  const parcela = window._MENS_PARCELA;
  if(!c) { alert("Busque um cliente primeiro."); return; }
  if(!parcela) { alert("Selecione a parcela a ser paga."); return; }
  const fp = el("mens-fp").value;
  const valor = parseFloat(el("mens-valor").value)||0;
  const dataPgto = el("mens-data").value;
  if(!fp) { alert("Selecione a forma de pagamento."); return; }
  if(!valor) { alert("Informe o valor."); return; }

  const id = MENS_ID++;
  const numRecibo = "REC-MENS-"+String(id).padStart(5,"0");

  // Salvar mensalidade no banco
  await dbInsert('mensalidades',{
    cliente_cpf:c.cpf, cliente_nome:c.nome, cliente_cod:c.codigo,
    parcela, valor, forma_pgto:fp, data_pgto:dataPgto, num_recibo:numRecibo
  });
  PAGAMENTOS_MENS.push({id,clienteCpf:c.cpf,clienteNome:c.nome,clienteCod:c.codigo,parcela,valor,formaPgto:fp,dataPgto,numRecibo,emitidoEm:new Date().toISOString()});

  // Baixar parcela no banco
  const novaParc = parcela + 1;
  await dbUpdate('clientes','codigo',c.codigo,{carne_atual:novaParc});
  const idx = CLIENTES.findIndex(x=>x.codigo===c.codigo);
  if(idx>=0 && parcela >= CLIENTES[idx].carneAtual) {
    CLIENTES[idx].carneAtual = novaParc;
    window._MENS_CLI = CLIENTES[idx];
  }

  // Lançar no caixa no banco
  const hora=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const mov={tipo:'entrada',data:dataPgto,hora,categoria:'Mensalidade',descricao:"Mensalidade parcela "+parcela+"/12 — "+c.nome,origem:c.codigo,forma_pgto:fp,valor};
  const cxRes=await dbInsert('caixa',mov);
  const cxId=cxRes?cxRes[0]?.id:CAIXA_ID++;
  CAIXA.push({id:cxId,tipo:'entrada',data:dataPgto,hora,categoria:'Mensalidade',descricao:"Mensalidade parcela "+parcela+"/12 — "+c.nome,origem:c.codigo,formaPgto:fp,valor});

  imprimirReciboMensalidade({id,clienteNome:c.nome,clienteCpf:c.cpf,clienteCod:c.codigo,parcela,valor,formaPgto:fp,dataPgto,numRecibo,endereco:c.endereco});

  el("mens-cpf").value="";
  el("mens-cliente-info").style.display="none";
  el("mens-msg").innerHTML="";
  window._MENS_CLI=null;
  window._MENS_PARCELA=null;
  renderMensalidades();
  alert("✅ Pagamento registrado, parcela "+parcela+" baixada e recibo gerado!\nTambém lançado automaticamente no Fluxo de Caixa.");
}

function alterarStatusGuia(numero) {
  const g = GUIAS.find(x=>x.numero===numero);

    return;
  }
  if(g.status==="Cancelada") {
    alert("❌ Esta guia já está cancelada.");
    return;
  }
  const confirmar = confirm("Deseja CANCELAR a guia " + numero + "?\n\nPaciente: " + g.nomePaciente + "\nMédico: " + g.medicoNome + "\n\nEsta ação não pode ser desfeita.");

  const agora = new Date().toISOString();
  dbUpdate('guias','numero',numero,{status:'Cancelada', baixada_em: agora});
  const idx = GUIAS.findIndex(x=>x.numero===numero);
  if(idx>=0) { GUIAS[idx].status = 'Cancelada'; GUIAS[idx].baixadaEm = agora; }
  renderGuias();
}

const _emitirGuiaBase = emitirGuia;
window._emitirGuiaV2 = async function() {
  if(!GUIA_CLI_OK){alert("Busque um beneficiário.");return;}
  const medId=el("ng-medico").value;
  if(!medId){alert("Selecione o médico.");return;}
  const dataHora=el("ng-data").value;
  if(!dataHora){alert("Informe data e hora.");return;}
  const infoComp = el("ng-info-comp") ? el("ng-info-comp").value : "";

  const tipoAt=el("ng-paciente").value;
  const paciente = tipoAt==="titular" ? {nome:GUIA_CLI_OK.nome,cpf:GUIA_CLI_OK.cpf} : GUIA_CLI_OK.dependentes.find((_,i)=>"dep_"+i===tipoAt);
  const med=MEDICOS.find(m=>m.id===medId);
  const numero=novoNum();
  const mesAt=new Date(dataHora).getMonth()+1;
  const anoAt=new Date(dataHora).getFullYear();

  const nova={
    numero, codigoCliente:GUIA_CLI_OK.codigo,
    nomePaciente:paciente?paciente.nome:GUIA_CLI_OK.nome,
    cpfPaciente:paciente?paciente.cpf:GUIA_CLI_OK.cpf,
    tipoAtendimento:tipoAt, medicoId:medId, medicoNome:med?med.nome:"",
    especialidade:med?med.especialidade:"", enderecoAtendimento:med?med.endereco:"",
    dataHora, tipoServico:el("ng-tipo").value,
    valorConsulta:parseFloat(el("ng-vc").value)||0,
    valorRepasse:parseFloat(el("ng-vr").value)||0,
    valorPago:parseFloat(el("ng-vp").value)||0,
    formaPagamento:el("ng-fp").value, infoComplementar:infoComp,
    emitidaEm:new Date().toISOString(), status:"Emitida",
    mesAtendimento:mesAt, anoAtendimento:anoAt,
    mesRepasse:mesAt===12?1:mesAt+1, anoRepasse:mesAt===12?anoAt+1:anoAt,
  };

  await dbInsert('guias', {
    numero:nova.numero, codigo_cliente:nova.codigoCliente,
    nome_paciente:nova.nomePaciente, cpf_paciente:nova.cpfPaciente,
    tipo_atendimento:nova.tipoAtendimento, medico_id:nova.medicoId,
    medico_nome:nova.medicoNome, especialidade:nova.especialidade,
    endereco_atendimento:nova.enderecoAtendimento, data_hora:nova.dataHora,
    tipo_servico:nova.tipoServico, valor_consulta:nova.valorConsulta,
    valor_repasse:nova.valorRepasse, valor_pago:nova.valorPago,
    forma_pagamento:nova.formaPagamento, info_complementar:infoComp,
    emitida_em:nova.emitidaEm, status:nova.status,
    mes_atendimento:nova.mesAtendimento, ano_atendimento:nova.anoAtendimento,
    mes_repasse:nova.mesRepasse, ano_repasse:nova.anoRepasse
  });

  GUIAS.unshift(nova);
  GUIA_TELA="lista";
  renderGuias();
  const pac=paciente||{nome:GUIA_CLI_OK.nome,cpf:GUIA_CLI_OK.cpf};
  setTimeout(()=>{ imprimirGuiaPDF(nova, med, pac); setTimeout(()=>imprimirReciboPDF(nova,med,pac),800); },300);
};

function buscarClienteIR() {
  const termo = el("ir-busca").value.trim().toLowerCase();
  const c = CLIENTES.find(x=>x.nome.toLowerCase().includes(termo)||x.cpf.includes(termo)||x.codigo.toLowerCase().includes(termo));
  if(!c){el("ir-cliente-info").innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Cliente não encontrado.</span></div>';return;}
  window._IR_CLI = c;
  el("ir-valor").value = (c.mensalidade * 12).toFixed(2);
  el("ir-cliente-info").innerHTML=`<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — ${c.codigo}</span></div>`;
}

function buscarClienteCanc() {
  const termo = el("canc-busca").value.trim().toLowerCase();
  const c = CLIENTES.find(x=>x.nome.toLowerCase().includes(termo)||x.cpf.includes(termo)||x.codigo.toLowerCase().includes(termo));
  if(!c){el("canc-cliente-info").innerHTML='<div class="alert alert-red"><span>❌</span><span style="color:#991b1b;font-weight:700">Cliente não encontrado.</span></div>';el("canc-btn").style.display="none";return;}
  window._CANC_CLI = c;
  el("canc-cliente-info").innerHTML=`<div class="alert alert-green" style="margin-bottom:12px"><span>✅</span><span style="color:#166534;font-weight:700">${c.nome} — ${c.cpf} — ${c.endereco||"—"}</span></div>`;
  el("canc-btn").style.display="block";
}

// 12/13. IMPORTAR CLIENTES E MÉDICOS VIA CSV
function abrirImportCSV(tipo) {
  const campo = tipo === "clientes" ? 
    "codigo,nome,cpf,nascimento,telefone,email,endereco,mensalidade,vencimento,status" :
    "id,nome,especialidade,cpf,pix,banco,agencia,conta,endereco,senha";
  
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>body{font-family:Arial,sans-serif;padding:24px;background:#f0f9ff}
  .box{background:#fff;border-radius:12px;padding:24px;max-width:700px;margin:0 auto;border:1.5px solid #e2e8f0}
  textarea{width:100%;height:200px;font-family:monospace;font-size:12px;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px}
  button{padding:10px 24px;background:#0c4a6e;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
  .exemplo{background:#f8fafc;border-radius:8px;padding:12px;font-family:monospace;font-size:11px;margin-bottom:16px;white-space:pre-wrap}
  </style></head><body>
  <div class="box">
    <h2 style="color:#0c4a6e;margin-top:0">📥 Importar ${tipo === "clientes" ? "Beneficiários" : "Médicos"} via CSV</h2>
    <p style="font-size:13px;color:#64748b">Cole os dados no formato CSV abaixo. A primeira linha é o cabeçalho (obrigatório).</p>
    <div class="exemplo">${campo}</div>
    <textarea id="csv-data" placeholder="Cole o CSV aqui..."></textarea>
    <br><br>
    <button onclick="processarCSV('${tipo}')">✅ Importar</button>
    <button onclick="window.close()" style="background:#94a3b8;margin-left:12px">Fechar</button>
    <div id="csv-resultado" style="margin-top:16px"></div>
  </div>
  <script>
  function processarCSV(tipo) {
    const raw = document.getElementById("csv-data").value.trim();
    if(!raw){alert("Cole o CSV primeiro.");return;}
    const lines = raw.split("\\n").filter(l=>l.trim());
    if(lines.length < 2){alert("CSV deve ter cabeçalho + pelo menos 1 linha.");return;}
    const headers = lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/[""]/g,""));
    const rows = lines.slice(1).map(l=>l.split(",").map(v=>v.trim().replace(/[""]/g,"")));
    const result = rows.map(row=>{
      const obj={};
      headers.forEach((h,i)=>obj[h]=row[i]||"");
      return obj;
    });
    // Enviar de volta para a janela pai
    if(window.opener) {
      window.opener._CSV_IMPORT_DATA = {tipo, rows:result};
      window.opener._processarImportCSV();
    }
    document.getElementById("csv-resultado").innerHTML = "<div style='color:green;font-weight:700'>✅ "+result.length+" registros enviados para importação!</div>";
  }
  <\/script>
  </body></html>`;
  const w = window.open("","_blank","width=800,height=600");
  w.document.write(html); w.document.close();
}

window._processarImportCSV = async function() {
  const {tipo, rows} = window._CSV_IMPORT_DATA;
  if(tipo === "clientes") {
    let ok=0;
    for(const r of rows) {
      const dados={
        codigo:r.codigo||("MFS"+String(CLIENTES.length+1+ok).padStart(5,"0")),
        nome:r.nome, cpf:r.cpf, nascimento:r.nascimento||null,
        telefone:r.telefone||null, email:r.email||null, endereco:r.endereco||null,
        mensalidade:parseFloat(r.mensalidade)||189.90,
        vencimento:parseInt(r.vencimento)||10,
        status:r.status||"adimplente", plano:"ativo", carne_atual:1, dependentes:[]
      };
      if(!dados.nome||!dados.cpf) continue;
      await dbInsert("clientes",dados);
      ok++;
    }
    await carregarDados();
    alert("✅ "+ok+" beneficiários importados com sucesso!");
    renderClientes();
  } else if(tipo === "medicos") {
    let ok=0;
    for(const r of rows) {
      const dados={
        id:r.id||("MED"+String(MEDICOS.length+1+ok).padStart(3,"0")),
        nome:r.nome, especialidade:r.especialidade||"", cpf:r.cpf||"",
        pix:r.pix||"", banco:r.banco||"", agencia:r.agencia||"",
        conta:r.conta||"", endereco:r.endereco||"", senha:r.senha||"1234"
      };
      if(!dados.nome) continue;
      await dbInsert("medicos",dados);
      ok++;
    }
    await carregarDados();
    alert("✅ "+ok+" médicos importados com sucesso!");
    renderMedicos();
  }
};
