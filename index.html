
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Fácil Saúde</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f0f9ff;min-height:100vh}
input,select,button,textarea{font-family:inherit}
.hidden{display:none!important}
/* Login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0c4a6e,#0369a1,#0e7490);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;max-width:420px;width:100%;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.login-header{background:linear-gradient(135deg,#0c4a6e,#0e7490);padding:36px 40px 28px;text-align:center}
.login-header h1{color:#fff;font-size:28px;font-weight:900}
.login-header p{color:#7dd3fc;font-size:20px;font-weight:700;letter-spacing:3px;margin-top:4px}
.login-header small{color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px}
.login-body{padding:36px 40px}
.login-body label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-body input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;margin-bottom:16px;transition:border-color .2s}
.login-body input:focus{border-color:#0e7490}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border:none;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 4px 20px rgba(12,74,110,.35);font-family:Georgia,serif}
.login-hint{margin-top:20px;background:#f8fafc;border-radius:12px;padding:14px 16px;font-size:12px;color:#64748b;line-height:1.9}
.login-hint strong{color:#0c4a6e}
.login-error{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:700;color:#991b1b;text-align:center}
/* Header */
#app-header{background:linear-gradient(135deg,#0c4a6e,#0369a1 60%,#0e7490);box-shadow:0 4px 24px rgba(12,74,110,.3)}
.header-top{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px}
.header-logo{color:#fff;font-weight:900;font-size:20px;font-family:Georgia,serif}
.header-logo span{color:#7dd3fc;font-weight:700;font-size:16px;display:block;letter-spacing:2px}
.header-actions{display:flex;align-items:center;gap:10px}
.user-badge{background:rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px}
.user-badge .name{color:#fff;font-size:12px;font-weight:800}
.user-badge .role{color:#7dd3fc;font-size:10px}
.btn-sair{padding:6px 14px;background:rgba(220,38,38,.25);border:1.5px solid rgba(220,38,38,.4);border-radius:8px;color:#fca5a5;font-size:12px;font-weight:700;cursor:pointer}
.btn-logo{padding:6px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
/* Tabs */
.tabs{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:4px}
.tab{padding:10px 18px;background:transparent;border:none;border-radius:10px 10px 0 0;color:rgba(255,255,255,.65);font-weight:600;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;font-family:Georgia,serif}
.tab.active{background:rgba(255,255,255,.18);color:#fff;font-weight:800;border-bottom-color:#7dd3fc}
/* Content */
#main-content{max-width:1200px;margin:0 auto;padding:28px}
/* Cards */
.card{background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;overflow:hidden;margin-bottom:20px}
.card-header{padding:13px 20px;border-bottom:1.5px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.card-title{font-weight:800;font-size:14px;color:#0f172a}
.card-body{padding:20px}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
/* Stat cards */
.stat-card{background:#fff;border-radius:16px;padding:20px 22px;border:1.5px solid #e2e8f0}
.stat-icon{font-size:24px;margin-bottom:6px}
.stat-val{font-size:32px;font-weight:900;font-family:monospace}
.stat-label{font-size:12px;color:#94a3b8;font-weight:700}
/* Buttons */
.btn{padding:11px 22px;border:2px solid;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border-color:#0e7490}
.btn-outline{background:transparent;color:#0c4a6e;border-color:#0c4a6e}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-red{background:#dc2626;color:#fff;border-color:#dc2626}
/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;color:#1e293b;outline:none;background:#fff}
.form-control:focus{border-color:#0e7490}
.form-control:disabled{background:#f8fafc}
/* Chip */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
/* Table */
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:800;color:#64748b;background:#f8fafc}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px}
/* Alert */
.alert{border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;gap:12px;align-items:center}
.alert-yellow{background:#fef3c7;border:1.5px solid #f59e0b}
.alert-green{background:#f0fdf4;border:1.5px solid #86efac}
.alert-red{background:#fef2f2;border:1.5px solid #fca5a5}
.alert-blue{background:#f0f9ff;border:1.5px solid #bae6fd}
/* Li info */
.li-row{display:flex;gap:8px;padding:4px 0}
.li-k{font-size:11px;color:#94a3b8;font-weight:700;min-width:120px;flex-shrink:0}
.li-v{font-size:13px;color:#1e293b;font-weight:600}
/* Client row */
.client-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Guia row */
.guia-row{background:#fff;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
/* Back btn */
.back-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#0e7490;font-weight:700;margin-bottom:16px;font-family:inherit}
/* Carne grid */
.carne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.carne-cell{padding:8px;border-radius:8px;text-align:center;font-size:12px;font-weight:800;border:1.5px solid #e2e8f0}
/* Portal medico valor */
.repasse-box{background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px}
.repasse-label{color:rgba(255,255,255,.75);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.repasse-val{color:#fff;font-size:42px;font-weight:900;font-family:monospace;margin:8px 0}
.repasse-data{color:#7dd3fc;font-size:14px;font-weight:700}
@media print{.no-print{display:none!important}}
</style>
</head>

async function dbGet(tabela, filtros='', ordem='') {
  try {
    let url = `${SUPA_URL}/rest/v1/${tabela}?select=*`;
    if (filtros) url += `&${filtros}`;
    if (ordem) {
      // Converte formato "coluna.desc" para "coluna=desc" do Supabase REST
      const ord = ordem.replace('.desc','').replace('.asc','');
      const dir = ordem.includes('.desc') ? 'desc' : 'asc';
      url += `&order=${ord}.${dir}`;
    }
    const r = await fetch(url, { headers: SUPA_HEADERS });
    if (!r.ok) { console.error('dbGet error:', r.status, await r.text()); return []; }
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.error('dbGet exception:', e); return []; }
}

async function dbInsert(tabela, dados) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${tabela}`, {
      method: 'POST',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) { console.error('dbInsert error:', r.status, await r.text()); return null; }
    return await r.json();
  } catch(e) { console.error('dbInsert exception:', e); return null; }
}

async function dbUpdate(tabela, campo, valor, dados) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, {
      method: 'PATCH',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) { console.error('dbUpdate error:', r.status, await r.text()); return null; }
    return await r.json();
  } catch(e) { console.error('dbUpdate exception:', e); return null; }
}

async function dbDelete(tabela, campo, valor) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, { method: 'DELETE', headers: SUPA_HEADERS });
    return r.ok;
  } catch(e) { console.error('dbDelete exception:', e); return false; }
}

          observacao:a.observacao||''
        });
        if(a.id > maxId) maxId = a.id;
      });
      AGENDA_ID = maxId + 1;
    }

    if(cxs.length > 0) {
      CAIXA.length = 0;
      let maxId = 0;
      cxs.forEach(m => {
        CAIXA.push({
          id:m.id, tipo:m.tipo||'entrada', data:m.data||'', hora:m.hora||'',
          categoria:m.categoria||'', descricao:m.descricao||'',
          origem:m.origem||'', formaPgto:m.forma_pgto||'',
          observacao:m.observacao||'', valor:parseFloat(m.valor)||0
        });
        if(m.id > maxId) maxId = m.id;
      });
      CAIXA_ID = maxId + 1;
    }

    if(mens.length > 0) {
      PAGAMENTOS_MENS.length = 0;
      let maxId = 0;
      mens.forEach(p => {
        PAGAMENTOS_MENS.push({
          id:p.id, clienteCpf:p.cliente_cpf||'', clienteNome:p.cliente_nome||'',
          clienteCod:p.cliente_cod||'', parcela:p.parcela||1,
          valor:parseFloat(p.valor)||0, formaPgto:p.forma_pgto||'',
          dataPgto:p.data_pgto||'', numRecibo:p.num_recibo||''
        });
        if(p.id > maxId) maxId = p.id;
      });
      MENS_ID = maxId + 1;
    }

  } catch(e) { console.error('Erro ao carregar dados:', e); }
  mostrarLoading(false);
}

  if(d) d.style.display = show ? 'flex' : 'none';

function fazerLogin() {
  const user = el("login-user").value.trim().toLowerCase();
  const pass = el("login-pass").value;
  el("login-error").classList.add("hidden");

  if(user === "clinica" && pass === "admin123") {
    LOGIN = {tipo:"clinica", nome:"Clínica Mais Fácil Saúde"};
    iniciarApp();
    return;
  }
  const med = MEDICOS.find(m => m.id.toLowerCase() === user && m.senha === pass);
  if(med) {
    LOGIN = {tipo:"medico", medico:med};
    iniciarApp();
    return;
  }
  el("login-error").textContent = "❌ Usuário ou senha incorretos. Tente novamente.";
  el("login-error").classList.remove("hidden");
}

el("login-pass").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });
el("login-user").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });

async function iniciarApp() {
  el("login-screen").classList.add("hidden");
  el("app-screen").classList.remove("hidden");
  await carregarDados();
  el("user-name").textContent = LOGIN.tipo==="clinica" ? "Clínica" : LOGIN.medico.nome;
  el("user-role").textContent = LOGIN.tipo==="clinica" ? "Administrador" : LOGIN.medico.especialidade;
  el("user-icon").textContent = LOGIN.tipo==="clinica" ? "🏥" : "👨‍⚕️";

  if(LOGIN.tipo === "medico") {
    el("tabs-clinica").classList.add("hidden");
    el("tabs-medico").classList.remove("hidden");
    el("btn-logo").classList.add("hidden");
    el("medico-tab-label").textContent = "👨‍⚕️ Portal Exclusivo — "+LOGIN.medico.nome;
    mostrarPortalMedico();
  } else {

}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Fácil Saúde</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f0f9ff;min-height:100vh}
input,select,button,textarea{font-family:inherit}
.hidden{display:none!important}
/* Login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0c4a6e,#0369a1,#0e7490);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;max-width:420px;width:100%;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.login-header{background:linear-gradient(135deg,#0c4a6e,#0e7490);padding:36px 40px 28px;text-align:center}
.login-header h1{color:#fff;font-size:28px;font-weight:900}
.login-header p{color:#7dd3fc;font-size:20px;font-weight:700;letter-spacing:3px;margin-top:4px}
.login-header small{color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px}
.login-body{padding:36px 40px}
.login-body label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-body input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;margin-bottom:16px;transition:border-color .2s}
.login-body input:focus{border-color:#0e7490}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border:none;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 4px 20px rgba(12,74,110,.35);font-family:Georgia,serif}
.login-hint{margin-top:20px;background:#f8fafc;border-radius:12px;padding:14px 16px;font-size:12px;color:#64748b;line-height:1.9}
.login-hint strong{color:#0c4a6e}
.login-error{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:700;color:#991b1b;text-align:center}
/* Header */
#app-header{background:linear-gradient(135deg,#0c4a6e,#0369a1 60%,#0e7490);box-shadow:0 4px 24px rgba(12,74,110,.3)}
.header-top{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px}
.header-logo{color:#fff;font-weight:900;font-size:20px;font-family:Georgia,serif}
.header-logo span{color:#7dd3fc;font-weight:700;font-size:16px;display:block;letter-spacing:2px}
.header-actions{display:flex;align-items:center;gap:10px}
.user-badge{background:rgba(255,255,255,.12);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px}
.user-badge .name{color:#fff;font-size:12px;font-weight:800}
.user-badge .role{color:#7dd3fc;font-size:10px}
.btn-sair{padding:6px 14px;background:rgba(220,38,38,.25);border:1.5px solid rgba(220,38,38,.4);border-radius:8px;color:#fca5a5;font-size:12px;font-weight:700;cursor:pointer}
.btn-logo{padding:6px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
/* Tabs */
.tabs{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:4px}
.tab{padding:10px 18px;background:transparent;border:none;border-radius:10px 10px 0 0;color:rgba(255,255,255,.65);font-weight:600;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;font-family:Georgia,serif}
.tab.active{background:rgba(255,255,255,.18);color:#fff;font-weight:800;border-bottom-color:#7dd3fc}
/* Content */
#main-content{max-width:1200px;margin:0 auto;padding:28px}
/* Cards */
.card{background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;overflow:hidden;margin-bottom:20px}
.card-header{padding:13px 20px;border-bottom:1.5px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.card-title{font-weight:800;font-size:14px;color:#0f172a}
.card-body{padding:20px}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
/* Stat cards */
.stat-card{background:#fff;border-radius:16px;padding:20px 22px;border:1.5px solid #e2e8f0}
.stat-icon{font-size:24px;margin-bottom:6px}
.stat-val{font-size:32px;font-weight:900;font-family:monospace}
.stat-label{font-size:12px;color:#94a3b8;font-weight:700}
/* Buttons */
.btn{padding:11px 22px;border:2px solid;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;border-color:#0e7490}
.btn-outline{background:transparent;color:#0c4a6e;border-color:#0c4a6e}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-red{background:#dc2626;color:#fff;border-color:#dc2626}
/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:800;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;color:#1e293b;outline:none;background:#fff}
.form-control:focus{border-color:#0e7490}
.form-control:disabled{background:#f8fafc}
/* Chip */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
/* Table */
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:800;color:#64748b;background:#f8fafc}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px}
/* Alert */
.alert{border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;gap:12px;align-items:center}
.alert-yellow{background:#fef3c7;border:1.5px solid #f59e0b}
.alert-green{background:#f0fdf4;border:1.5px solid #86efac}
.alert-red{background:#fef2f2;border:1.5px solid #fca5a5}
.alert-blue{background:#f0f9ff;border:1.5px solid #bae6fd}
/* Li info */
.li-row{display:flex;gap:8px;padding:4px 0}
.li-k{font-size:11px;color:#94a3b8;font-weight:700;min-width:120px;flex-shrink:0}
.li-v{font-size:13px;color:#1e293b;font-weight:600}
/* Client row */
.client-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Guia row */
.guia-row{background:#fff;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
/* Back btn */
.back-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#0e7490;font-weight:700;margin-bottom:16px;font-family:inherit}
/* Carne grid */
.carne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.carne-cell{padding:8px;border-radius:8px;text-align:center;font-size:12px;font-weight:800;border:1.5px solid #e2e8f0}
/* Portal medico valor */
.repasse-box{background:linear-gradient(135deg,#0c4a6e,#0e7490);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px}
.repasse-label{color:rgba(255,255,255,.75);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.repasse-val{color:#fff;font-size:42px;font-weight:900;font-family:monospace;margin:8px 0}
.repasse-data{color:#7dd3fc;font-size:14px;font-weight:700}
@media print{.no-print{display:none!important}}
</style>
</head>

async function dbGet(tabela, filtros='', ordem='') {
  try {
    let url = `${SUPA_URL}/rest/v1/${tabela}?select=*`;
    if (filtros) url += `&${filtros}`;
    if (ordem) {
      // Converte formato "coluna.desc" para "coluna=desc" do Supabase REST
      const ord = ordem.replace('.desc','').replace('.asc','');
      const dir = ordem.includes('.desc') ? 'desc' : 'asc';
      url += `&order=${ord}.${dir}`;
    }
    const r = await fetch(url, { headers: SUPA_HEADERS });
    if (!r.ok) { console.error('dbGet error:', r.status, await r.text()); return []; }
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.error('dbGet exception:', e); return []; }
}

async function dbInsert(tabela, dados) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${tabela}`, {
      method: 'POST',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) { console.error('dbInsert error:', r.status, await r.text()); return null; }
    return await r.json();
  } catch(e) { console.error('dbInsert exception:', e); return null; }
}

async function dbUpdate(tabela, campo, valor, dados) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, {
      method: 'PATCH',
      headers: SUPA_HEADERS,
      body: JSON.stringify(dados)
    });
    if (!r.ok) { console.error('dbUpdate error:', r.status, await r.text()); return null; }
    return await r.json();
  } catch(e) { console.error('dbUpdate exception:', e); return null; }
}

async function dbDelete(tabela, campo, valor) {
  try {
    const url = `${SUPA_URL}/rest/v1/${tabela}?${campo}=eq.${encodeURIComponent(valor)}`;
    const r = await fetch(url, { method: 'DELETE', headers: SUPA_HEADERS });
    return r.ok;
  } catch(e) { console.error('dbDelete exception:', e); return false; }
}

          observacao:a.observacao||''
        });
        if(a.id > maxId) maxId = a.id;
      });
      AGENDA_ID = maxId + 1;
    }

    if(cxs.length > 0) {
      CAIXA.length = 0;
      let maxId = 0;
      cxs.forEach(m => {
        CAIXA.push({
          id:m.id, tipo:m.tipo||'entrada', data:m.data||'', hora:m.hora||'',
          categoria:m.categoria||'', descricao:m.descricao||'',
          origem:m.origem||'', formaPgto:m.forma_pgto||'',
          observacao:m.observacao||'', valor:parseFloat(m.valor)||0
        });
        if(m.id > maxId) maxId = m.id;
      });
      CAIXA_ID = maxId + 1;
    }

    if(mens.length > 0) {
      PAGAMENTOS_MENS.length = 0;
      let maxId = 0;
      mens.forEach(p => {
        PAGAMENTOS_MENS.push({
          id:p.id, clienteCpf:p.cliente_cpf||'', clienteNome:p.cliente_nome||'',
          clienteCod:p.cliente_cod||'', parcela:p.parcela||1,
          valor:parseFloat(p.valor)||0, formaPgto:p.forma_pgto||'',
          dataPgto:p.data_pgto||'', numRecibo:p.num_recibo||''
        });
        if(p.id > maxId) maxId = p.id;
      });
      MENS_ID = maxId + 1;
    }

  } catch(e) { console.error('Erro ao carregar dados:', e); }
  mostrarLoading(false);
}

  if(d) d.style.display = show ? 'flex' : 'none';

function fazerLogin() {
  const user = el("login-user").value.trim().toLowerCase();
  const pass = el("login-pass").value;
  el("login-error").classList.add("hidden");

  if(user === "clinica" && pass === "admin123") {
    LOGIN = {tipo:"clinica", nome:"Clínica Mais Fácil Saúde"};
    iniciarApp();
    return;
  }
  const med = MEDICOS.find(m => m.id.toLowerCase() === user && m.senha === pass);
  if(med) {
    LOGIN = {tipo:"medico", medico:med};
    iniciarApp();
    return;
  }
  el("login-error").textContent = "❌ Usuário ou senha incorretos. Tente novamente.";
  el("login-error").classList.remove("hidden");
}

el("login-pass").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });
el("login-user").addEventListener("keydown", e => { if(e.key==="Enter") fazerLogin(); });

async function iniciarApp() {
  el("login-screen").classList.add("hidden");
  el("app-screen").classList.remove("hidden");
  await carregarDados();
  el("user-name").textContent = LOGIN.tipo==="clinica" ? "Clínica" : LOGIN.medico.nome;
  el("user-role").textContent = LOGIN.tipo==="clinica" ? "Administrador" : LOGIN.medico.especialidade;
  el("user-icon").textContent = LOGIN.tipo==="clinica" ? "🏥" : "👨‍⚕️";

  if(LOGIN.tipo === "medico") {
    el("tabs-clinica").classList.add("hidden");
    el("tabs-medico").classList.remove("hidden");
    el("btn-logo").classList.add("hidden");
    el("medico-tab-label").textContent = "👨‍⚕️ Portal Exclusivo — "+LOGIN.medico.nome;
    mostrarPortalMedico();
  } else {

}
